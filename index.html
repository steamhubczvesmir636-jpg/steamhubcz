<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SteamHubCZ | Vesmír636</title>
    
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script type="text/javascript">
        (function() { emailjs.init("yw3YNXC58nL3Bh4fl"); })();
    </script>

    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow-x: hidden; font-family: 'Segoe UI', Tahoma, sans-serif; color: #c7d5e0; background-color: #0b0e14; }
        
        /* Pozadí a video */
        .video-background { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; overflow: hidden; }
        .video-background iframe { width: 100vw; height: 56.25vw; min-height: 100vh; min-width: 177.77vh; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); border: none; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(5, 9, 15, 0.8); z-index: 0; }
        
        /* Hlavní kontejnery */
        .container { position: relative; z-index: 1; background: rgba(42, 71, 94, 0.85); padding: 2.5rem; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.7); max-width: 950px; width: 90%; text-align: center; backdrop-filter: blur(10px); margin: 100px auto; border: 1px solid rgba(102, 192, 244, 0.3); display: none; }
        .container.active { display: block; animation: fadeIn 0.4s ease; }
        
        h1 { color: #66c0f4; font-size: 4.5rem; margin-bottom: 0; text-transform: uppercase; letter-spacing: 4px; font-weight: 800; }
        .founder { color: #ffffff; font-weight: bold; font-size: 1.2rem; margin-bottom: 40px; display: block; }
        
        /* Tlačítka z screenshotu */
        .button-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; margin-top: 20px; }
        .card-btn { background: #66c0f4; border: none; padding: 15px; border-radius: 8px; cursor: pointer; font-weight: bold; color: #171a21; font-size: 1.1rem; transition: 0.3s; text-decoration: none; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .card-btn:hover { background: white; transform: translateY(-2px); }
        
        .logout-btn { background: #e74c3c; color: white; width: 200px; margin: 30px auto 0; padding: 12px; }
        .logout-btn:hover { background: #ff5e4d; }

        /* UI prvky */
        #irl-clock { position: fixed; bottom: 20px; right: 20px; z-index: 100; background: rgba(0,0,0,0.8); color: #66c0f4; padding: 10px 20px; border-radius: 8px; font-weight: bold; border: 1px solid #66c0f4; font-size: 1.5rem; }
        
        /* Nastavení zpět vlevo nahoře */
        #settings-trigger { position: fixed; top: 20px; left: 20px; z-index: 100; background: rgba(0,0,0,0.6); color: white; border: 1px solid #f39c12; width: 55px; height: 55px; border-radius: 50%; cursor: pointer; display: none; align-items: center; justify-content: center; font-size: 1.5rem; transition: 0.3s; }
        #settings-trigger:hover { background: #f39c12; color: #171a21; }

        /* Zámek */
        #lock-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0b0e14; z-index: 9999; display: none; align-items: center; justify-content: center; flex-direction: column; text-align: center; }
        .auth-input { width: 100%; padding: 12px; margin: 10px 0; background: #2a475e; border: 1px solid #66c0f4; border-radius: 5px; color: white; box-sizing: border-box; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="lock-screen">
        <h1 style="color:#e74c3c; font-size: 3.5rem;">⚠️ SYSTÉM UZAMČEN</h1>
        <p id="lock-reason-text" style="font-size: 1.5rem; color: white; margin: 20px 0;"></p>
        <div style="width: 250px;">
             <input type="password" id="unlock-pass" class="auth-input" placeholder="Admin heslo">
             <button onclick="requestUnlock()" class="card-btn" style="background:#e74c3c; color:white; width: 100%;">ODEMKNOUT</button>
        </div>
    </div>

    <div class="video-background"><div id="player"></div></div>
    <div class="overlay"></div>
    <div id="irl-clock">00:00:00</div>
    
    <button id="settings-trigger" onclick="openSection('profile-content')">⚙️</button>

    <div id="auth-wrapper">
        <div id="login-box" class="container active" style="max-width: 450px;">
            <h2 style="color:#66c0f4; font-size: 2rem;">SteamHub Vstup</h2>
            <input type="email" id="login_email" class="auth-input" placeholder="Tvůj e-mail">
            <button id="send-btn" class="card-btn" style="width:100%" onclick="sendAuthCode()">ODESLAT KÓD</button>
            
            <div id="otp-area" style="display:none; margin-top: 20px;">
                <input type="text" id="otp_code" class="auth-input" placeholder="Zadej kód z e-mailu">
                <button class="card-btn" style="background:#75b022; color:white; width:100%" onclick="verifyOTP()">VSTOUPIT</button>
            </div>
        </div>
    </div>

    <div id="main-content" class="container">
        <h1>STEAMHUBCZ</h1>
        <span class="founder">Zakladatel: Vesmír636</span>
        
        <div class="button-grid">
            <button class="card-btn" style="background: white;" onclick="openSection('faq-content')">❓ FAQ</button>
            <button class="card-btn" onclick="alert('Sekce HRY se připravuje!')">🎮 HRY</button>
            <button class="card-btn" onclick="alert('Žádné aktivní EVENTY!')">📅 EVENTY</button>
        </div>
        
        <button class="card-btn logout-btn" onclick="logout()">ODHLÁSIT</button>
    </div>

    <div id="faq-content" class="container">
        <h1>ČASTÉ DOTAZY</h1>
        <div style="text-align: left; margin: 30px 0; font-size: 1.1rem;">
            <p><b style="color:#66c0f4;">Kdo je zakladatel?</b><br>Hlavním správcem je Vesmír636.</p>
            <p><b style="color:#66c0f4;">Jak funguje web?</b><br>Web slouží jako rozcestník pro komunitu SteamHubCZ.</p>
        </div>
        <button class="card-btn" onclick="closeSection('faq-content')" style="width: 150px; margin: 0 auto;">ZPĚT</button>
    </div>

    <div id="profile-content" class="container">
        <h1>MODERÁTOR PANEL ⚙️</h1>
        <div id="mod-auth">
            <input type="password" id="mod-pass" class="auth-input" placeholder="Zadej admin heslo">
            <button class="card-btn" onclick="unlockMod()">VSTOUPIT</button>
        </div>
        <div id="mod-tools" style="display:none;">
            <select id="lock-reason-select" class="auth-input">
                <option value="Probíhá údržba systému.">🔧 Údržba</option>
                <option value="Aktualizujeme web.">🆙 Aktualizace</option>
            </select>
            <button class="card-btn" onclick="setGlobalLock(true)" style="background:#e74c3c; color:white;">ZAMKNOUT WEB</button>
            <button class="card-btn" onclick="setGlobalLock(false)" style="background:#75b022; color:white;">ODEMKNOUT WEB</button>
        </div>
        <button class="card-btn" onclick="closeSection('profile-content')" style="width: 150px; margin: 20px auto 0; background: #4e5d6a; color: white;">ZAVŘÍT</button>
    </div>

    <script>
        // Firebase Config
        const firebaseConfig = { databaseURL: "https://steamhubcz-default-rtdb.europe-west1.firebasedatabase.app/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const MASTER_PASSWORD = "6976";
        let generatedOTP = "";

        // Firebase Lock Sync
        db.ref('siteSettings/lock').on('value', (snapshot) => {
            const status = snapshot.val();
            const lockScreen = document.getElementById('lock-screen');
            if (status && status.isLocked) {
                lockScreen.style.display = 'flex';
                document.getElementById('lock-reason-text').innerText = status.reason;
            } else {
                lockScreen.style.display = 'none';
            }
        });

        // EmailJS Auth
        function sendAuthCode() {
            const email = document.getElementById('login_email').value;
            if(!email.includes('@')) return alert("Zadej platný e-mail!");
            generatedOTP = Math.floor(100000 + Math.random() * 900000).toString();
            const btn = document.getElementById('send-btn');
            btn.innerText = "Odesílám...";
            emailjs.send("service_0jeaxzq", "template_6jc2oeh", { to_email: email, otp_code: generatedOTP })
            .then(() => {
                alert("Kód odeslán!");
                document.getElementById('otp-area').style.display = 'block';
                btn.innerText = "Kód odeslán znovu";
            });
        }

        function verifyOTP() {
            if(document.getElementById('otp_code').value === generatedOTP) {
                localStorage.setItem("sh_logged", "true");
                showMain();
            } else { alert("Špatný kód!"); }
        }

        // Admin Logika
        function setGlobalLock(isLocked) {
            const reason = document.getElementById('lock-reason-select').value;
            db.ref('siteSettings/lock').set({ isLocked: isLocked, reason: isLocked ? reason : "" });
        }

        function unlockMod() {
            if(document.getElementById('mod-pass').value === MASTER_PASSWORD) {
                document.getElementById('mod-auth').style.display = 'none';
                document.getElementById('mod-tools').style.display = 'block';
            } else { alert("Chyba!"); }
        }

        function requestUnlock() {
            if(document.getElementById('unlock-pass').value === MASTER_PASSWORD) {
                setGlobalLock(false);
            } else { alert("Špatné heslo!"); }
        }

        // Menu & UI
        window.onload = function() {
            if(localStorage.getItem("sh_logged") === "true") showMain();
            setInterval(() => { document.getElementById('irl-clock').innerText = new Date().toLocaleTimeString('cs-CZ'); }, 1000);
        };

        function showMain() {
            document.getElementById('auth-wrapper').style.display = 'none';
            document.getElementById('main-content').classList.add('active');
            document.getElementById('settings-trigger').style.display = 'flex';
        }

        function logout() { localStorage.removeItem("sh_logged"); location.reload(); }
        function openSection(id) { document.querySelectorAll('.container').forEach(c => c.classList.remove('active')); document.getElementById(id).classList.add('active'); }
        function closeSection(id) { document.getElementById(id).classList.remove('active'); document.getElementById('main-content').classList.add('active'); }

        // YouTube
        var tag = document.createElement('script'); tag.src = "https://www.youtube.com/iframe_api";
        var firstScriptTag = document.getElementsByTagName('script')[0]; firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);
        var player;
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player', { videoId: '0BFw93N4ZJw', playerVars: { 'autoplay': 1, 'controls': 0, 'mute': 1, 'loop': 1, 'playlist': '0BFw93N4ZJw' } });
        }
    </script>
</body>
</html>
