<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SteamHubCZ | Vesmír636</title>
    
    <!-- Firebase Knihovny -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>

    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow-x: hidden; font-family: 'Segoe UI', Tahoma, sans-serif; color: #c7d5e0; background-color: #0b0e14; }
        .video-background { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; overflow: hidden; }
        .video-background iframe { width: 100vw; height: 56.25vw; min-height: 100vh; min-width: 177.77vh; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); border: none; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(5, 9, 15, 0.8); z-index: 0; }
        #global-alert { position: fixed; top: 0; left: 0; width: 100%; background: #e67e22; color: white; padding: 10px; text-align: center; font-weight: bold; z-index: 1000; display: none; }
        .container { position: relative; z-index: 1; background: rgba(42, 71, 94, 0.85); padding: 2.5rem; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.7); max-width: 950px; width: 90%; text-align: center; backdrop-filter: blur(10px); margin: 80px auto; border: 1px solid rgba(102, 192, 244, 0.3); display: none; }
        .container.active { display: block; animation: fadeIn 0.4s ease; }
        h1 { color: #66c0f4; font-size: 4.5rem; margin-bottom: 0; text-transform: uppercase; letter-spacing: 4px; font-weight: 800; }
        .founder { color: #ffffff; font-weight: bold; font-size: 1.2rem; margin-bottom: 30px; display: block; }
        .button-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; margin-top: 20px; }
        .card-btn { background: #66c0f4; border: none; padding: 15px; border-radius: 8px; cursor: pointer; font-weight: bold; color: #171a21; font-size: 1.1rem; transition: 0.3s; text-decoration: none; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .card-btn:hover { background: white; transform: translateY(-2px); }
        .auth-card { background: #171a21; padding: 40px; border-radius: 15px; border: 1px solid #66c0f4; width: 350px; margin: 100px auto; text-align: center; position: relative; z-index: 10; }
        .auth-input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 5px; border: 1px solid #2a475e; background: #2a475e; color: white; box-sizing: border-box; }
        .auth-btn { width: 100%; padding: 12px; background: #66c0f4; border: none; color: #171a21; font-weight: bold; border-radius: 5px; cursor: pointer; margin-top: 10px; }
        #irl-clock { position: fixed; bottom: 20px; right: 20px; z-index: 100; background: rgba(0,0,0,0.8); color: #66c0f4; padding: 10px 20px; border-radius: 8px; font-weight: bold; border: 1px solid #66c0f4; font-size: 1.5rem; }
        #discord-fixed { position: fixed; bottom: 20px; right: 200px; z-index: 100; background: #7289da; color: white; padding: 10px 20px; border-radius: 8px; font-weight: bold; text-decoration: none; border: 1px solid white; display: none; }
        #settings-trigger { position: fixed; top: 20px; left: 20px; z-index: 100; background: rgba(0,0,0,0.6); color: white; border: 1px solid #f39c12; width: 55px; height: 55px; border-radius: 50%; cursor: pointer; display: none; align-items: center; justify-content: center; font-size: 1.5rem; }
        #lock-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #05070a; z-index: 9999; display: none; align-items: center; justify-content: center; flex-direction: column; text-align: center; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="global-alert"></div>

    <!-- LOCK SCREEN -->
    <div id="lock-screen">
        <h1 style="color: #ff4d4d;">SERVER UZAMČEN</h1>
        <p id="lock-reason-text" style="font-size: 1.5rem; color: #c7d5e0;"></p>
        <div id="admin-unlock-zone" style="display: none; margin-top: 20px;">
            <p style="color: #f39c12;">Jsi přihlášen jako Admin. Ostatní vidí tuto stopku.</p>
            <button onclick="adminQuickUnlock()" class="auth-btn" style="background:#ff4d4d; color:white; padding: 10px 20px;">ODEMKNOUT PRO VŠECHNY</button>
        </div>
    </div>

    <div class="video-background"><div id="player"></div></div>
    <div class="overlay"></div>
    <div id="irl-clock">00:00:00</div>
    <a href="https://discord.gg/ps4TDE6nr" target="_blank" id="discord-fixed">DISCORD 💬</a>
    
    <button id="settings-trigger" onclick="openSection('profile-content')">⚙️</button>

    <!-- AUTHENTICATION SECTION -->
    <div id="auth-wrapper">
        <div id="login-box" class="auth-card">
            <h2 style="color:#66c0f4">SteamHub Login</h2>
            <input type="email" id="login_email" class="auth-input" placeholder="E-mail">
            <input type="password" id="login_pass" class="auth-input" placeholder="Heslo">
            <button class="auth-btn" onclick="handleLogin()">PŘIHLÁSIT SE</button>
            <p onclick="toggleAuth('reg')" style="cursor:pointer; text-decoration:underline; font-size:0.8rem; margin-top:15px;">Registrace</p>
        </div>

        <div id="reg-box" class="auth-card" style="display:none;">
            <h2 style="color:#66c0f4">Registrace</h2>
            <input type="text" id="reg_name" class="auth-input" placeholder="Přezdívka">
            <input type="email" id="reg_email" class="auth-input" placeholder="E-mail">
            <input type="password" id="reg_pass" class="auth-input" placeholder="Heslo (min. 6 znaků)">
            <button class="auth-btn" onclick="handleRegister()">REGISTROVAT</button>
            <p onclick="toggleAuth('login')" style="cursor:pointer; text-decoration:underline; font-size:0.8rem; margin-top:15px;">Zpět na login</p>
        </div>
    </div>

    <!-- MAIN CONTENT -->
    <div id="main-content" class="container">
        <div style="display:flex; align-items:center; justify-content:center; gap:15px; margin-bottom:10px;">
            <img id="main-avatar" src="https://cdn-icons-png.flaticon.com/512/149/149071.png" style="width:50px; height:50px; border-radius:50%; border:2px solid #66c0f4;">
            <h2 id="welcome-text" style="margin:0;">Vítej!</h2>
        </div>
        <h1>STEAMHUBCZ</h1>
        <span class="founder">Zakladatel: Vesmír636</span>
        <div class="button-grid">
            <button class="card-btn" onclick="alert('Brzy v provozu...')">❓ FAQ</button>
            <a href="https://store.steampowered.com" target="_blank" class="card-btn">🎮 STEAM</a>
            <button class="card-btn" style="background: #f39c12; color:white;" onclick="openSection('news-content')">📅 EVENTY</button>
        </div>
        <button class="card-btn" onclick="logout()" style="background:#e74c3c; color:white; width: 150px; margin: 30px auto 0; font-size: 0.9rem;">ODHLÁSIT SE</button>
    </div>

    <!-- ADMIN PANEL -->
    <div id="profile-content" class="container">
        <h1>ADMIN KONZOLE ⚙️</h1>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:20px; text-align:left;">
            <div style="background: rgba(0,0,0,0.3); padding: 15px; border-radius: 10px;">
                <h3>📢 Oznámení</h3>
                <input type="text" id="ann-input" class="auth-input" placeholder="Text oznámení...">
                <button class="auth-btn" onclick="setAnn()">AKTUALIZOVAT</button>
            </div>
            <div style="background: rgba(0,0,0,0.3); padding: 15px; border-radius: 10px;">
                <h3>🔒 Správa zámku</h3>
                <select id="lock-reason-select" class="auth-input">
                    <option value="Probíhá údržba systému">Údržba</option>
                    <option value="Server je plný">Plno</option>
                </select>
                <button class="auth-btn" onclick="adminToggleLock(true)" style="background:#e74c3c; color:white;">ZAMKNOUT</button>
                <button class="auth-btn" onclick="adminToggleLock(false)" style="background:#2ecc71; color:white;">ODEMKNOUT</button>
            </div>
        </div>
        <button onclick="closeSection('profile-content')" class="auth-btn" style="width:120px; margin-top:20px;">ZAVŘÍT</button>
    </div>

    <script>
        // --- 1. INICIALIZACE (DŮLEŽITÉ POŘADÍ) ---
        const SUPER_ADMIN_ID = "7d7fRaaUDCfu8tmHIVy7AQzzKA53";
        const firebaseConfig = { databaseURL: "https://steamhubcz-default-rtdb.europe-west1.firebasedatabase.app/" };
        
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const auth = firebase.auth();

        // --- 2. AUTH LISTENERY ---
        auth.onAuthStateChanged(user => {
            if (user) {
                showMain();
                loadProfile(user);
                checkLockStatus(user);
            } else {
                hideMain();
            }
        });

        // --- 3. FUNKCE PŘIHLÁŠENÍ / REGISTRACE ---
        async function handleLogin() {
            const email = document.getElementById('login_email').value;
            const pass = document.getElementById('login_pass').value;
            if(!email || !pass) return alert("Vyplň vše!");
            try { await auth.signInWithEmailAndPassword(email, pass); } catch(e) { alert("Chyba: " + e.message); }
        }

        async function handleRegister() {
            const email = document.getElementById('reg_email').value;
            const pass = document.getElementById('reg_pass').value;
            const name = document.getElementById('reg_name').value;
            if(pass.length < 6) return alert("Heslo musí mít aspoň 6 znaků!");
            try {
                const res = await auth.createUserWithEmailAndPassword(email, pass);
                await res.user.updateProfile({ displayName: name });
                location.reload();
            } catch(e) { alert(e.message); }
        }

        function logout() { auth.signOut().then(() => location.reload()); }

        // --- 4. LOCK SYSTEM LOGIKA ---
        function checkLockStatus(user) {
            db.ref('siteSettings/lock').on('value', snap => {
                const data = snap.val();
                const lockScreen = document.getElementById('lock-screen');
                const adminZone = document.getElementById('admin-unlock-zone');

                if(data && data.isLocked) {
                    if(user.uid === SUPER_ADMIN_ID) {
                        lockScreen.style.display = 'none'; // Admin vidí web
                        adminZone.style.display = 'block'; // Vidí info, že je zamčeno
                    } else {
                        lockScreen.style.display = 'flex';
                        document.getElementById('lock-reason-text').innerText = "Důvod: " + data.reason;
                    }
                } else {
                    lockScreen.style.display = 'none';
                }
            });
        }

        function adminToggleLock(state) {
            const reason = document.getElementById('lock-reason-select').value;
            db.ref('siteSettings/lock').set({ isLocked: state, reason: reason });
        }

        function adminQuickUnlock() { db.ref('siteSettings/lock').set({ isLocked: false, reason: "" }); }

        // --- 5. UI FUNKCE ---
        function showMain() {
            document.getElementById('auth-wrapper').style.display = 'none';
            document.getElementById('main-content').classList.add('active');
            document.getElementById('discord-fixed').style.display = 'block';
            if(auth.currentUser.uid === SUPER_ADMIN_ID) {
                document.getElementById('settings-trigger').style.display = 'flex';
            }
        }

        function hideMain() {
            document.getElementById('auth-wrapper').style.display = 'block';
            document.querySelectorAll('.container').forEach(c => c.classList.remove('active'));
            document.getElementById('settings-trigger').style.display = 'none';
        }

        function openSection(id) {
            if(id === 'profile-content' && auth.currentUser.uid !== SUPER_ADMIN_ID) return;
            document.querySelectorAll('.container').forEach(c => c.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function closeSection(id) {
            document.getElementById(id).classList.remove('active');
            document.getElementById('main-content').classList.add('active');
        }

        function toggleAuth(m) {
            document.getElementById('login-box').style.display = m === 'login' ? 'block' : 'none';
            document.getElementById('reg-box').style.display = m === 'reg' ? 'block' : 'none';
        }

        function loadProfile(user) {
            document.getElementById('welcome-text').innerText = "Vítej, " + (user.displayName || "Uživatel");
            if(user.photoURL) document.getElementById('main-avatar').src = user.photoURL;
        }

        function setAnn() {
            const txt = document.getElementById('ann-input').value;
            db.ref('siteSettings/announcement').set(txt);
            alert("Oznámení nastaveno!");
        }

        db.ref('siteSettings/announcement').on('value', snap => {
            const alrt = document.getElementById('global-alert');
            if(snap.val()) { alrt.innerText = snap.val(); alrt.style.display = 'block'; }
            else alrt.style.display = 'none';
        });

        setInterval(() => { document.getElementById('irl-clock').innerText = new Date().toLocaleTimeString('cs-CZ'); }, 1000);

        // --- YOUTUBE API ---
        var player;
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player', { videoId: '0BFw93N4ZJw', playerVars: { 'autoplay': 1, 'controls': 0, 'mute': 1, 'loop': 1, 'playlist': '0BFw93N4ZJw' } });
        }
    </script>
    <script src="https://www.youtube.com/iframe_api"></script>
</body>
</html>
