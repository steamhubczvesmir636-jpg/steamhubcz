    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <style>
        /* Tvoje CSS - vše ponecháno, pouze přidáno CSS pro intro */
        #intro-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 999999; background: #000; display: flex; align-items: center; justify-content: center; transition: opacity 1s ease; }
        #intro-overlay video { width: 100%; height: 100%; object-fit: cover; }
        #start-btn { position: absolute; z-index: 1000000; padding: 20px 40px; font-size: 24px; background: #66c0f4; color: #171a21; border: none; cursor: pointer; border-radius: 10px; font-weight: bold; }
        
        /* Zbytek tvých původních stylů... (zkráceno pro přehlednost) */
        :root { --bg-color: #f0f2f5; --sidebar-color: #171a21; --primary-blue: #66c0f4; }
        body, html { margin: 0; padding: 0; height: 100%; background: #000; overflow: hidden; }
        .hidden { display: none !important; }
        /* ... sem patří tvé původní CSS ... */
    </style>
</head>
<body>

    <div id="intro-overlay">
        <button id="start-btn" onclick="startExperience()">VSTOUPIT DO WEBU</button>
        <video id="intro-video" playsinline>
            <source src="intro.mp4" type="video/mp4">
        </video>
    </div>

    <div id="main-website">
        </div>

    <script>
        // Logika pro Intro
        const introOverlay = document.getElementById('intro-overlay');
        const introVideo = document.getElementById('intro-video');

        function startExperience() {
            document.getElementById('start-btn').style.display = 'none';
            introVideo.muted = false;
            introVideo.play();
        }

        introVideo.onended = function() {
            introOverlay.style.opacity = '0';
            setTimeout(() => {
                introOverlay.style.display = 'none';
            }, 1000);
        };

        // Zde pokračuje tvůj původní JavaScript (Firebase, překlady, funkce...)

        // PŘÍKLAD TVÉHO PŮVODNÍHO JS:

            // ...
        }
    </script>
</body>
</html>
