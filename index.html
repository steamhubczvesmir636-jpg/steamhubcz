<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SteamHubCZ | Dashboard</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script src="https://www.youtube.com/iframe_api"></script>
    <script>(function() { emailjs.init("yw3YNXC58nL3Bh4fl"); })();</script>

    <style>
        :root { --bg-color: #f0f2f5; --sidebar-color: #171a21; --primary-blue: #66c0f4; --text-main: #1b2838; --card-bg: #ffffff; --accent-orange: #f39c12; --discord-color: #7289da; }
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Segoe UI', Arial, sans-serif; background-color: var(--bg-color); color: var(--text-main); overflow: hidden; }
        .video-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background: #000; pointer-events: none; }
        .video-bg iframe { width: 100vw; height: 56.25vw; min-height: 100vh; min-width: 177.77vh; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); filter: brightness(0.3); pointer-events: none; }
        #system-lock-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; color: white; z-index: 10000; display: none; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 20px; box-sizing: border-box; }
        #login-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; z-index: 1000; padding: 20px; box-sizing: border-box; }
        .auth-card { background: rgba(23, 26, 33, 0.95); padding: 35px; border-radius: 15px; width: 100%; max-width: 550px; max-height: 90vh; overflow-y: auto; box-shadow: 0 15px 35px rgba(0,0,0,0.5); text-align: center; color: white; backdrop-filter: blur(10px); border: 1px solid var(--primary-blue); }
        .auth-input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 6px; border: 1px solid #2a475e; background: #1b2838; color: white; box-sizing: border-box; }
        .btn-steam { width: 100%; padding: 12px; background: var(--primary-blue); color: #171a21; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; text-transform: uppercase; margin-top: 10px; }
        .btn-steam:hover { filter: brightness(1.1); }
        .rules-container { text-align: left; background: rgba(27, 40, 56, 0.8); padding: 20px; border-radius: 8px; margin-top: 15px; border: 1px solid #2a475e; font-size: 0.9rem; line-height: 1.5; }
        .rules-title { color: var(--accent-orange); font-weight: bold; font-size: 1.2rem; border-bottom: 1px solid #2a475e; padding-bottom: 8px; margin-bottom: 12px; text-align: center; }
        .rule-item { margin-bottom: 10px; color: #c7d5e0; }
        .rule-item strong { color: white; }
        .app-container { display: flex; height: 100vh; overflow: hidden; }
        .sidebar { width: 260px; background-color: var(--sidebar-color); color: white; display: flex; flex-direction: column; z-index: 10; }
        .sidebar-header { padding: 25px; font-size: 1.4rem; font-weight: 900; color: var(--primary-blue); border-bottom: 1px solid #2a475e; text-align: center; }
        .nav-item { padding: 15px 25px; cursor: pointer; display: flex; align-items: center; gap: 12px; color: #c7d5e0; }
        .nav-item:hover, .nav-item.active { background: #2a475e; color: white; border-left: 4px solid var(--primary-blue); }
        .main-content { flex: 1; overflow-y: auto; background: rgba(235, 240, 245, 0.85); display: flex; flex-direction: column; }
        .top-bar { background: #171a21; padding: 12px 30px; display: flex; justify-content: space-between; align-items: center; color: white; }
        .content-area { padding: 30px; }
        .card { background: white; border-radius: 8px; padding: 25px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); margin-bottom: 25px; }
        .hidden { display: none !important; }
        .tab-btn { background: none; border: none; color: #888; font-size: 1.1rem; padding: 10px 20px; cursor: pointer; font-weight: bold; }
        .tab-btn.active { color: var(--primary-blue); border-bottom: 2px solid var(--primary-blue); }
        .link-forgot { display: inline-block; margin-top: 15px; color: #888; text-decoration: none; font-size: 0.9rem; cursor: pointer; }
        .link-forgot:hover { color: var(--primary-blue); text-decoration: underline; }
    </style>
</head>
<body>

    <div id="system-lock-screen">
        <h1 style="font-size: 3rem; color: #e74c3c; margin-bottom: 10px;">⚠️ SYSTEM UZAMČEN</h1>
        <p id="lock-message" style="font-size: 1.2rem; color: #ccc;">Probíhá plánovaná údržba portálu SteamHubCZ. Zkuste to prosím později.</p>
    </div>

    <div class="video-bg"><div id="player"></div></div>

    <div id="login-screen">
        <div class="auth-card">
            <div id="step-rules">
                <div class="rules-container">
                    <div class="rules-title">Pravidla serveru SteamHub CZ</div>
                    <div class="rule-item"><strong>1. Základní chování:</strong> Buďte slušní.</div>
                    <button class="btn-steam" style="background: #2ecc71; margin-top: 20px;" onclick="acceptRules()">SOUHLASÍM A CHCI POKRAČOVAT</button>
                </div>
            </div>

            <div id="step-form" class="hidden">
                <div id="auth-tabs-nav">
                    <h1 style="color: var(--primary-blue); margin-bottom: 5px;">Vítejte</h1>
                    <div style="margin-bottom: 20px; display: flex; justify-content: center; gap: 10px;">
                        <button id="tab-login" class="tab-btn active" onclick="switchAuthTab('login')">Přihlášení</button>
                        <button id="tab-register" class="tab-btn" onclick="switchAuthTab('register')">Registrace</button>
                    </div>
                </div>
                
                <div id="auth-login-fields">
                    <input type="email" id="auth_email" class="auth-input" placeholder="E-mail">
                    <input type="password" id="auth_pass" class="auth-input" placeholder="Heslo">
                    <button class="btn-steam" onclick="handleLogin()">Vstoupit</button>
                    <span class="link-forgot" onclick="alert('Funkce bude brzy doplněna')">Zapomněl jsi heslo?</span>
                </div>

                <div id="auth-register-fields" class="hidden">
                    <input type="text" id="reg_name" class="auth-input" placeholder="Jméno">
                    <input type="email" id="reg_email" class="auth-input" placeholder="E-mail">
                    <input type="password" id="reg_pass" class="auth-input" placeholder="Heslo">
                    <button class="btn-steam" onclick="handleRegister()">Registrovat</button>
                </div>
            </div>
        </div>
    </div>

    <div id="app" class="app-container hidden">
        <div class="sidebar">
            <div class="sidebar-header">STEAMHUBCZ</div>
            <div class="nav-item active" onclick="showPage('dashboard')">📊 Dashboard</div>
            <div class="nav-item" onclick="showPage('faq')">❓ FAQ</div>
            <div class="nav-item" onclick="showPage('settings')">⚙️ Nastavení</div>
        </div>
        <div class="main-content">
            <div class="top-bar">
                <div id="page-title">DASHBOARD</div>
                <button onclick="logout()">ODHLÁSIT</button>
            </div>
            <div class="content-area">
                <div id="page-dashboard" class="page"><div class="card"><h2>Dashboard</h2><p>Vítejte v hlavním rozhraní.</p></div></div>
                <div id="page-faq" class="page hidden"><div class="card"><h2>FAQ</h2></div></div>
                <div id="page-settings" class="page hidden"><div class="card"><h2>Nastavení</h2></div></div>
            </div>
        </div>
    </div>

    <script>
        // 1. Firebase Config Setup
        const firebaseConfig = {
            apiKey: "YOUR_API_KEY",
            authDomain: "YOUR_PROJECT_ID.firebaseapp.com",
            projectId: "YOUR_PROJECT_ID",
            storageBucket: "YOUR_PROJECT_ID.appspot.com",
            messagingSenderId: "YOUR_SENDER_ID",
            appId: "YOUR_APP_ID",
            databaseURL: "https://steamhubcz-default-rtdb.europe-west1.firebasedatabase.app/"
        };
        firebase.initializeApp(firebaseConfig);
        const auth = firebase.auth();

        // 2. Global Variables
        let player;

        // 3. YouTube Player Logic
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player', {
                videoId: 'ATo6V6Xm_eY', 
                playerVars: { 'autoplay': 1, 'controls': 0, 'mute': 1, 'loop': 1, 'playlist': 'ATo6V6Xm_eY' },
            });
        }

        // 4. UI Navigation Logic
        function acceptRules() {
            document.getElementById('step-rules').classList.add('hidden');
            document.getElementById('step-form').classList.remove('hidden');
        }

        function switchAuthTab(type) {
            document.getElementById('tab-login').classList.remove('active');
            document.getElementById('tab-register').classList.remove('active');
            document.getElementById('auth-login-fields').classList.add('hidden');
            document.getElementById('auth-register-fields').classList.add('hidden');
            
            if(type === 'login') {
                document.getElementById('tab-login').classList.add('active');
                document.getElementById('auth-login-fields').classList.remove('hidden');
            } else {
                document.getElementById('tab-register').classList.add('active');
                document.getElementById('auth-register-fields').classList.remove('hidden');
            }
        }

        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.add('hidden'));
            document.getElementById('page-' + pageId).classList.remove('hidden');
        }

        // 5. Firebase Auth Logic
        function handleLogin() {
            const email = document.getElementById('auth_email').value;
            const pass = document.getElementById('auth_pass').value;

            auth.signInWithEmailAndPassword(email, pass)
                .then(() => {
                    document.getElementById('login-screen').classList.add('hidden');
                    document.getElementById('app').classList.remove('hidden');
                })
                .catch((error) => alert("Chyba: " + error.message));
        }

        function handleRegister() {
            const email = document.getElementById('reg_email').value;
            const pass = document.getElementById('reg_pass').value;

            auth.createUserWithEmailAndPassword(email, pass)
                .then(() => {
                    alert("Registrace úspěšná! Nyní se můžete přihlásit.");
                    switchAuthTab('login');
                })
                .catch((error) => alert("Chyba: " + error.message));
        }

        function logout() { 
            auth.signOut().then(() => {
                location.reload();
            });
        }
    </script>
</body>
</html>
