<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SteamHubCZ | Admin Control</title>
    
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script type="text/javascript">
        (function() { emailjs.init("yw3YNXC58nL3Bh4fl"); })();
    </script>

    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow-x: hidden; font-family: 'Segoe UI', Tahoma, sans-serif; color: #c7d5e0; background-color: #0b0e14; }
        .video-background { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; overflow: hidden; }
        .video-background iframe { width: 100vw; height: 56.25vw; min-height: 100vh; min-width: 177.77vh; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); border: none; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(5, 9, 15, 0.85); z-index: 0; }
        
        #global-alert { position: fixed; top: 0; left: 0; width: 100%; background: #e67e22; color: white; padding: 10px; text-align: center; font-weight: bold; z-index: 1000; display: none; }
        .container { position: relative; z-index: 1; background: rgba(42, 71, 94, 0.9); padding: 2rem; border-radius: 15px; max-width: 1000px; width: 90%; text-align: center; backdrop-filter: blur(10px); margin: 60px auto; border: 1px solid rgba(102, 192, 244, 0.3); display: none; }
        .container.active { display: block; animation: fadeIn 0.4s ease; }
        
        h1 { color: #66c0f4; font-size: 3.5rem; margin: 0; text-transform: uppercase; }
        .auth-card { background: #171a21; padding: 30px; border-radius: 15px; border: 1px solid #66c0f4; width: 350px; margin: 100px auto; text-align: center; position: relative; z-index: 10; }
        .auth-input, select { width: 100%; padding: 10px; margin: 8px 0; border-radius: 5px; border: 1px solid #2a475e; background: #2a475e; color: white; box-sizing: border-box; }
        .auth-btn { width: 100%; padding: 12px; background: #66c0f4; border: none; color: #171a21; font-weight: bold; border-radius: 5px; cursor: pointer; }
        
        /* Table styles for User List */
        .user-table { width: 100%; border-collapse: collapse; margin-top: 20px; font-size: 0.9rem; background: #1b2838; }
        .user-table th, .user-table td { padding: 10px; border: 1px solid #2a475e; text-align: left; }
        .user-table th { background: #2a475e; color: #66c0f4; }
        .status-ban { color: #ff4d4d; font-weight: bold; }
        .role-badge { padding: 2px 6px; border-radius: 4px; font-size: 0.7rem; font-weight: bold; text-transform: uppercase; }

        #irl-clock { position: fixed; bottom: 20px; right: 20px; z-index: 100; background: rgba(0,0,0,0.8); color: #66c0f4; padding: 10px 20px; border-radius: 8px; font-weight: bold; border: 1px solid #66c0f4; }
        #settings-trigger { position: fixed; top: 20px; left: 20px; z-index: 100; background: rgba(0,0,0,0.6); color: white; border: 1px solid #f39c12; width: 50px; height: 50px; border-radius: 50%; cursor: pointer; display: none; align-items: center; justify-content: center; }

        #lock-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #05070a; z-index: 9999; display: none; align-items: center; justify-content: center; flex-direction: column; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="global-alert"></div>

    <div id="lock-screen">
        <h1 style="color:#ff4d4d">WEB UZAMČEN</h1>
        <p id="lock-reason-text" style="color: white; font-size: 1.5rem;"></p>
        <input type="password" id="unlock-pass" class="auth-input" style="width: 200px;" placeholder="Admin kód">
        <button onclick="requestUnlock()" class="auth-btn" style="width: 200px; background:#ff4d4d; color:white;">ODEMKNOUT</button>
    </div>

    <div class="video-background"><div id="player"></div></div>
    <div class="overlay"></div>
    <div id="irl-clock">00:00:00</div>
    
    <button id="settings-trigger" onclick="openSection('profile-content')">⚙️</button>

    <!-- AUTH -->
    <div id="auth-wrapper">
        <div id="login-box" class="auth-card">
            <h2 style="color:#66c0f4">SteamHub Vstup</h2>
            <input type="email" id="login_email" class="auth-input" placeholder="Tvůj e-mail">
            <button class="auth-btn" onclick="sendAuthCode()">ODESLAT KÓD</button>
        </div>
        <div id="verify-box" class="auth-card" style="display:none;">
            <p>Zadej kód z e-mailu:</p>
            <input type="text" id="otp_code" class="auth-input" placeholder="000000">
            <button class="auth-btn" onclick="verifyOTP()">POTVRDIT</button>
        </div>
    </div>

    <!-- MAIN -->
    <div id="main-content" class="container">
        <div style="display:flex; align-items:center; justify-content:center; gap:15px;">
            <img id="main-avatar" src="" style="width:60px; height:60px; border-radius:50%; border:2px solid #66c0f4;">
            <h2 id="welcome-text">Vítej!</h2>
        </div>
        <h1>STEAMHUBCZ</h1>
        <div style="display:grid; grid-template-columns: 1fr 1fr 1fr; gap:10px; margin-top:20px;">
            <button class="auth-btn" onclick="openSection('faq-content')">❓ FAQ</button>
            <button class="auth-btn" onclick="openSection('news-content')">📅 EVENTY</button>
            <button class="auth-btn" style="background:#e74c3c; color:white;" onclick="logout()">ODHLÁSIT</button>
        </div>
    </div>

    <!-- MOD PANEL & SETTINGS -->
    <div id="profile-content" class="container">
        <h1>ADMIN & MOD PANEL</h1>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:20px; text-align:left;">
            <div style="background:rgba(0,0,0,0.3); padding:15px; border-radius:10px;">
                <h3>👤 Tvůj Profil</h3>
                <input type="text" id="edit-name" class="auth-input" placeholder="Jméno">
                <input type="text" id="edit-avatar" class="auth-input" placeholder="URL Avataru">
                <button class="auth-btn" onclick="saveProfile()" style="background:#2ecc71; color:white;">ULOŽIT</button>
            </div>

            <div style="background:rgba(0,0,0,0.3); padding:15px; border-radius:10px; border:1px solid #f39c12;">
                <h3>🛡️ Moderace</h3>
                <div id="mod-auth">
                    <input type="password" id="mod-pass" class="auth-input" placeholder="Admin kód">
                    <button class="auth-btn" onclick="unlockMod()" style="background:#f39c12; color:white;">PŘIHLÁSIT DO PANELU</button>
                </div>
                <div id="mod-tools" style="display:none;">
                    <button class="auth-btn" onclick="adminToggleLock()" style="background:#e74c3c; color:white; margin-bottom:10px;">ZAMKNOUT WEB</button>
                    <input type="text" id="ann-input" class="auth-input" placeholder="Globální zpráva...">
                    <button class="auth-btn" onclick="setAnn()" style="background:#e67e22; color:white;">POSLAT OZNÁMENÍ</button>
                </div>
            </div>
        </div>

        <!-- USER LIST (Only for Mods) -->
        <div id="user-management" style="display:none; margin-top:20px; background:rgba(0,0,0,0.3); padding:15px; border-radius:10px;">
            <h3>👥 Správa uživatelů & Návštěv</h3>
            <div style="overflow-x:auto;">
                <table class="user-table">
                    <thead>
                        <tr>
                            <th>Uživatel</th>
                            <th>Role</th>
                            <th>Akce</th>
                        </tr>
                    </thead>
                    <tbody id="user-list-body">
                        <!-- Dynamicky doplňováno -->
                    </tbody>
                </table>
            </div>
        </div>
        
        <button onclick="closeSection('profile-content')" class="auth-btn" style="width:150px; margin-top:20px; background:#4e5d6a; color:white;">ZAVŘÍT</button>
    </div>

    <!-- FAQ & NEWS (Zjednodušeno pro kód) -->
    <div id="faq-content" class="container"><h1>FAQ</h1><div id="faq-list"></div><button onclick="closeSection('faq-content')" class="auth-btn">Zpět</button></div>
    <div id="news-content" class="container"><h1>Eventy</h1><p>Čtvrtek 16:00 | Pátek 17:30</p><button onclick="closeSection('news-content')" class="auth-btn">Zpět</button></div>

    <script>
        const firebaseConfig = { databaseURL: "https://steamhubcz-default-rtdb.europe-west1.firebasedatabase.app/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        const _v = 4260;
        const _sec = () => (_v * 2).toString(); // 8520
        let currentEmail = localStorage.getItem("sh_email");
        let otp = "";

        window.onload = function() {
            // Sledování zámku
            db.ref('siteSettings/lock').on('value', s => {
                const data = s.val();
                if(data?.isLocked) {
                    document.getElementById('lock-screen').style.display = 'flex';
                    document.getElementById('lock-reason-text').innerText = data.reason;
                } else document.getElementById('lock-screen').style.display = 'none';
            });

            // Sledování banu u aktuálního uživatele
            if(currentEmail) {
                const userKey = btoa(currentEmail).replace(/=/g, "");
                db.ref('users/' + userKey).on('value', s => {
                    const u = s.val();
                    if(u?.banned) { alert("Máš BAN!"); logout(); }
                });
            }

            // Načtení oznámení
            db.ref('siteSettings/announcement').on('value', s => {
                const a = document.getElementById('global-alert');
                if(s.val()) { a.innerText = s.val(); a.style.display = 'block'; }
                else a.style.display = 'none';
            });

            if(localStorage.getItem("sh_logged") === "true") { showMain(); loadProfile(); }
            setInterval(() => { document.getElementById('irl-clock').innerText = new Date().toLocaleTimeString('cs-CZ'); }, 1000);
        };

        // --- AUTH SYSTÉM ---
        function sendAuthCode() {
            const email = document.getElementById('login_email').value;
            if(!email.includes('@')) return alert("Špatný email!");
            currentEmail = email;
            otp = Math.floor(100000 + Math.random() * 900000).toString();
            emailjs.send("service_0jeaxzq", "template_6jc2oeh", { to_email: email, otp_code: otp }).then(() => {
                document.getElementById('login-box').style.display = 'none';
                document.getElementById('verify-box').style.display = 'block';
            });
        }

        function verifyOTP() {
            if(document.getElementById('otp_code').value === otp) {
                localStorage.setItem("sh_logged", "true");
                localStorage.setItem("sh_email", currentEmail);
                
                // Zápis do DB (Seznam návštěvníků)
                const userKey = btoa(currentEmail).replace(/=/g, "");
                db.ref('users/' + userKey).update({
                    email: currentEmail,
                    lastVisit: new Date().toLocaleString(),
                    name: localStorage.getItem("sh_name") || "Nový Uživatel",
                    role: "uživatel",
                    avatar: localStorage.getItem("sh_img") || "https://cdn-icons-png.flaticon.com/512/149/149071.png"
                });
                location.reload();
            } else alert("Chyba!");
        }

        // --- ADMIN FUNKCE ---
        function unlockMod() {
            if(document.getElementById('mod-pass').value === _sec()) {
                document.getElementById('mod-auth').style.display = 'none';
                document.getElementById('mod-tools').style.display = 'block';
                document.getElementById('user-management').style.display = 'block';
                loadUserList();
            } else alert("Přístup zamítnut!");
        }

        function loadUserList() {
            db.ref('users').on('value', s => {
                const users = s.val();
                const body = document.getElementById('user-list-body');
                body.innerHTML = "";
                for(let id in users) {
                    const u = users[id];
                    const row = `<tr>
                        <td><img src="${u.avatar}" width="20"> ${u.name}<br><small>${u.email}</small></td>
                        <td><span class="role-badge" style="background:#66c0f4; color:#000">${u.role}</span></td>
                        <td>
                            <button onclick="modAction('${id}', 'ban')" style="background:#e74c3c; color:white; border:none; padding:3px; cursor:pointer">${u.banned ? 'UNBAN' : 'BAN'}</button>
                            <button onclick="modAction('${id}', 'role')" style="background:#f39c12; color:white; border:none; padding:3px; cursor:pointer">ROLE</button>
                            <button onclick="modAction('${id}', 'avatar')" style="background:#3498db; color:white; border:none; padding:3px; cursor:pointer">IMG</button>
                        </td>
                    </tr>`;
                    body.innerHTML += row;
                }
            });
        }

        function modAction(id, type) {
            if(type === 'ban') {
                db.ref('users/'+id+'/banned').transaction(b => !b);
            } else if(type === 'role') {
                const r = prompt("Nová role (uživatel/moderator/vip):");
                if(r) db.ref('users/'+id+'/role').set(r);
            } else if(type === 'avatar') {
                const img = prompt("URL nového avataru:");
                if(img) db.ref('users/'+id+'/avatar').set(img);
            }
        }

        function adminToggleLock() {
            const r = prompt("Důvod zamčení:");
            db.ref('siteSettings/lock').set({ isLocked: true, reason: r || "Údržba" });
        }

        function requestUnlock() {
            if(document.getElementById('unlock-pass').value === _sec()) {
                db.ref('siteSettings/lock').set({ isLocked: false, reason: "" });
            } else alert("Špatný kód!");
        }

        function setAnn() { db.ref('siteSettings/announcement').set(document.getElementById('ann-input').value); }

        // --- CORE ---
        function showMain() {
            document.getElementById('auth-wrapper').style.display = 'none';
            document.getElementById('main-content').classList.add('active');
            document.getElementById('settings-trigger').style.display = 'flex';
        }
        function logout() { localStorage.clear(); location.reload(); }
        function openSection(id) { document.querySelectorAll('.container').forEach(c => c.classList.remove('active')); document.getElementById(id).classList.add('active'); }
        function closeSection(id) { document.getElementById(id).classList.remove('active'); document.getElementById('main-content').classList.add('active'); }
        function loadProfile() {
            const name = localStorage.getItem("sh_name") || "Uživatel";
            const img = localStorage.getItem("sh_img") || "https://cdn-icons-png.flaticon.com/512/149/149071.png";
            document.getElementById('welcome-text').innerText = "Vítej, " + name;
            document.getElementById('main-avatar').src = img;
            document.getElementById('edit-name').value = name;
            document.getElementById('edit-avatar').value = img;
        }
        function saveProfile() {
            localStorage.setItem("sh_name", document.getElementById('edit-name').value);
            localStorage.setItem("sh_img", document.getElementById('edit-avatar').value);
            // Aktualizace v DB pro adminy
            const userKey = btoa(currentEmail).replace(/=/g, "");
            db.ref('users/' + userKey).update({
                name: document.getElementById('edit-name').value,
                avatar: document.getElementById('edit-avatar').value
            });
            loadProfile(); alert("Uloženo!");
        }
    </script>
    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        var player;
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player', { videoId: '0BFw93N4ZJw', playerVars: { 'autoplay': 1, 'controls': 0, 'mute': 1, 'loop': 1, 'playlist': '0BFw93N4ZJw' } });
        }
    </script>
</body>
</html>
