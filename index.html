<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SteamHubCZ | Vesmír636</title>
    
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script type="text/javascript">
        (function() { emailjs.init("yw3YNXC58nL3Bh4fl"); })();
    </script>

    <style>
        :root {
            --steam-blue: #66c0f4;
            --steam-dark: #171a21;
            --steam-bg: #0b0e14;
            --accent-orange: #f39c12;
            --glass: rgba(23, 26, 33, 0.9);
        }

        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow-x: hidden; font-family: 'Segoe UI', sans-serif; color: #c7d5e0; background-color: var(--steam-bg); }
        
        .video-background { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; overflow: hidden; }
        .video-background iframe { width: 100vw; height: 56.25vw; min-height: 100vh; min-width: 177.77vh; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); border: none; filter: brightness(0.35); }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, rgba(5, 9, 15, 0.4) 0%, rgba(5, 9, 15, 0.9) 100%); z-index: 0; }
        
        /* Horní lišta pro Landing Page */
        .top-nav { position: absolute; top: 30px; right: 40px; display: flex; gap: 20px; z-index: 100; }
        .nav-link { color: white; text-decoration: none; font-weight: bold; font-size: 1.1rem; padding: 10px 20px; border-radius: 5px; transition: 0.3s; border: 1px solid rgba(255,255,255,0.2); }
        .nav-link:hover { background: var(--steam-blue); color: var(--steam-dark); }

        #settings-trigger { position: fixed; top: 25px; left: 25px; z-index: 100; background: rgba(0,0,0,0.7); color: white; border: 1px solid var(--accent-orange); width: 60px; height: 60px; border-radius: 50%; cursor: pointer; display: none; align-items: center; justify-content: center; font-size: 1.8rem; transition: 0.3s; }

        .container { position: relative; z-index: 1; background: var(--glass); padding: 3rem; border-radius: 20px; box-shadow: 0 15px 50px rgba(0,0,0,0.8); max-width: 950px; width: 90%; text-align: center; backdrop-filter: blur(15px); margin: 80px auto; border: 1px solid rgba(102, 192, 244, 0.2); display: none; }
        .container.active { display: block; animation: fadeIn 0.5s ease; }
        
        h1 { color: var(--steam-blue); font-size: 4rem; margin-bottom: 10px; text-transform: uppercase; letter-spacing: 5px; font-weight: 900; }
        .welcome-sub { font-size: 1.5rem; color: white; opacity: 0.9; margin-bottom: 30px; }
        
        .auth-card { background: var(--steam-dark); padding: 40px; border-radius: 20px; border: 1px solid rgba(102, 192, 244, 0.3); width: 400px; margin: 100px auto; text-align: center; position: relative; z-index: 10; display: none; }
        .auth-input { width: 100%; padding: 14px; margin: 10px 0; border-radius: 8px; border: 1px solid #2a475e; background: #1b2838; color: white; box-sizing: border-box; font-size: 1rem; }
        .auth-btn { width: 100%; padding: 14px; background: var(--steam-blue); border: none; color: var(--steam-dark); font-weight: 800; border-radius: 8px; cursor: pointer; text-transform: uppercase; transition: 0.3s; margin-top: 10px; }
        .auth-btn:hover { background: white; }

        .remember-me { text-align: left; margin: 10px 0; font-size: 0.9rem; display: flex; align-items: center; gap: 8px; }

        #irl-clock { position: fixed; bottom: 25px; right: 25px; z-index: 100; background: rgba(0,0,0,0.85); color: var(--steam-blue); padding: 12px 25px; border-radius: 12px; font-weight: 900; border: 1px solid var(--steam-blue); font-size: 1.5rem; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="video-background"><div id="player"></div></div>
    <div class="overlay"></div>
    <div id="irl-clock">00:00:00</div>
    
    <button id="settings-trigger" onclick="openSection('profile-content')">⚙️</button>

    <!-- LANDING PAGE (VÍTEJTE) -->
    <div id="landing-page" class="container active" style="margin-top: 150px;">
        <div class="top-nav">
            <a href="#" class="nav-link" onclick="toggleAuth('login')">SIGN IN</a>
            <a href="#" class="nav-link" onclick="toggleAuth('register')">REGISTER</a>
        </div>
        <h1>VÍTEJTE NA<br>STEAMHUB CZ/SK/ENG</h1>
        <p class="welcome-sub">Vaše brána do světa gamingu a komunity</p>
        <button class="auth-btn" style="width: 250px;" onclick="toggleAuth('login')">ZAČÍT PROHLÍŽET</button>
    </div>

    <!-- PŘIHLAŠOVACÍ OKNO -->
    <div id="auth-box" class="auth-card">
        <h2 id="auth-title" style="color:var(--steam-blue)">PŘIHLÁŠENÍ</h2>
        <div id="step-1">
            <input type="email" id="auth_email" class="auth-input" placeholder="E-mail">
            <input type="password" id="auth_pass" class="auth-input" placeholder="Heslo">
            <div class="remember-me">
                <input type="checkbox" id="remember"> <label for="remember">Zapamatovat si mě</label>
            </div>
            <button class="auth-btn" id="send-btn" onclick="handleAuthAction()">POKRAČOVAT</button>
            <button class="auth-btn" style="background:none; color:white; border:1px solid #2a475e; margin-top:10px;" onclick="location.reload()">ZRUŠIT</button>
        </div>
        <!-- KROK PRO KÓD -->
        <div id="step-otp" style="display:none; margin-top: 20px; border-top: 1px solid #2a475e; padding-top: 20px;">
            <p style="color:var(--accent-orange)">Zadejte 6-místný kód z mailu:</p>
            <input type="text" id="otp_input" class="auth-input" placeholder="000000" maxlength="6" style="text-align:center; letter-spacing:5px;">
            <button class="auth-btn" style="background: #2ecc71; color: white;" onclick="verifyOTP()">POTVRDIT</button>
        </div>
    </div>

    <!-- HLAVNÍ DASHBOARD (PO PŘIHLÁŠENÍ) -->
    <div id="main-content" class="container">
        <div style="display:flex; align-items:center; justify-content:center; gap:20px; margin-bottom:15px;">
            <img id="main-avatar" src="" style="width:65px; height:65px; border-radius:50%; border:3px solid var(--steam-blue); object-fit: cover;">
            <h2 id="welcome-text">Ahoj!</h2>
        </div>
        <h1>STEAMHUBCZ</h1>
        <span style="color: white; opacity: 0.7;">DEVELOPER: VESMÍR636</span>
        
        <div style="display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; margin-top: 40px;">
            <button class="auth-btn" onclick="openSection('faq-content')">❓ FAQ</button>
            <a href="https://store.steampowered.com" target="_blank" class="auth-btn" style="text-decoration:none; display:flex; align-items:center; justify-content:center;">🎮 STEAM</a>
            <button class="auth-btn" style="background: var(--accent-orange); color: white;" onclick="openSection('news-content')">📅 AKCE</button>
        </div>
        <button class="auth-btn" onclick="logout()" style="width:150px; background:none; border:1px solid #e74c3c; color:#e74c3c; margin-top:60px;">ODHLÁSIT SE</button>
    </div>

    <!-- NASTAVENÍ -->
    <div id="profile-content" class="container">
        <h1>NASTAVENÍ ⚙️</h1>
        <div style="text-align: left; max-width: 500px; margin: 0 auto;">
            <div style="margin-bottom: 20px;">
                <h3 style="color: var(--steam-blue);">HUDBA</h3>
                <button class="auth-btn" onclick="muteMusic()" style="background: #e74c3c; color: white; width: 45%;">VYPNOUT</button>
                <button class="auth-btn" onclick="unmuteMusic()" style="background: #2ecc71; color: white; width: 45%;">ZAPNOUT</button>
            </div>
            <div>
                <h3 style="color: var(--steam-blue);">PROFIL</h3>
                <input type="text" id="edit-name" class="auth-input" placeholder="Jméno">
                <input type="text" id="edit-avatar" class="auth-input" placeholder="Avatar URL">
                <button class="auth-btn" onclick="saveProfile()" style="background:#75b022; color:white;">ULOŽIT</button>
            </div>
        </div>
        <button onclick="closeSection('profile-content')" class="auth-btn" style="width:150px; margin-top:20px; background:#2a475e; color:white;">ZAVŘÍT</button>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://steamhubcz-default-rtdb.europe-west1.firebasedatabase.app/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let generatedOTP = null;
        var player;

        window.onload = function() {
            // Kontrola zapamatování
            if(localStorage.getItem("sh_remembered_email")) {
                document.getElementById('auth_email').value = localStorage.getItem("sh_remembered_email");
                document.getElementById('auth_pass').value = localStorage.getItem("sh_remembered_pass");
                document.getElementById('remember').checked = true;
            }

            if(localStorage.getItem("sh_logged") === "true") { showMain(); loadProfile(); }
            setInterval(() => { document.getElementById('irl-clock').innerText = new Date().toLocaleTimeString('cs-CZ'); }, 1000);
        };

        function toggleAuth(type) {
            document.getElementById('landing-page').classList.remove('active');
            document.getElementById('auth-box').style.display = 'block';
            document.getElementById('auth-title').innerText = type === 'login' ? 'PŘIHLÁŠENÍ' : 'REGISTRACE';
        }

        function handleAuthAction() {
            const email = document.getElementById('auth_email').value;
            const pass = document.getElementById('auth_pass').value;
            const remember = document.getElementById('remember').checked;

            if(!email.includes('@') || pass.length < 4) { alert("Chybné údaje!"); return; }

            if(remember) {
                localStorage.setItem("sh_remembered_email", email);
                localStorage.setItem("sh_remembered_pass", pass);
            } else {
                localStorage.removeItem("sh_remembered_email");
                localStorage.removeItem("sh_remembered_pass");
            }

            generatedOTP = Math.floor(100000 + Math.random() * 900000).toString();
            document.getElementById('send-btn').innerText = "ODESÍLÁM...";
            
            emailjs.send("service_0jeaxzq", "template_6jc2oeh", { to_email: email, otp_code: generatedOTP }).then(() => {
                document.getElementById('step-1').style.display = 'none';
                document.getElementById('step-otp').style.display = 'block';
            });
        }

        function verifyOTP() {
            if(document.getElementById('otp_input').value === generatedOTP) {
                localStorage.setItem("sh_logged", "true");
                showMain(); loadProfile();
            } else alert("Špatný kód!");
        }

        function showMain() {
            document.getElementById('landing-page').style.display = 'none';
            document.getElementById('auth-box').style.display = 'none';
            document.querySelectorAll('.container').forEach(c => c.classList.remove('active'));
            document.getElementById('main-content').classList.add('active');
            document.getElementById('settings-trigger').style.display = 'flex';
        }

        function logout() { 
            localStorage.setItem("sh_logged", "false"); 
            location.reload(); 
        }

        function openSection(id) { document.querySelectorAll('.container').forEach(c => c.classList.remove('active')); document.getElementById(id).classList.add('active'); }
        function closeSection(id) { document.getElementById(id).classList.remove('active'); document.getElementById('main-content').classList.add('active'); }

        function loadProfile() {
            const name = localStorage.getItem("sh_name") || "Uživatel";
            const img = localStorage.getItem("sh_img") || "https://cdn-icons-png.flaticon.com/512/149/149071.png";
            document.getElementById('welcome-text').innerText = "Vítej zpět, " + name;
            document.getElementById('main-avatar').src = img;
            document.getElementById('edit-name').value = name;
            document.getElementById('edit-avatar').value = img;
        }

        function saveProfile() {
            localStorage.setItem("sh_name", document.getElementById('edit-name').value);
            localStorage.setItem("sh_img", document.getElementById('edit-avatar').value);
            loadProfile(); alert("Uloženo!");
        }

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player', { 
                videoId: '0BFw93N4ZJw', 
                playerVars: { 'autoplay': 1, 'controls': 0, 'mute': 1, 'loop': 1, 'playlist': '0BFw93N4ZJw' }
            });
        }
        function muteMusic() { player.mute(); }
        function unmuteMusic() { player.unMute(); }
    </script>
    <script src="https://www.youtube.com/iframe_api"></script>
</body>
</html>
