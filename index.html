<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SteamHubCZ | Dashboard</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script>(function() { emailjs.init("yw3YNXC58nL3Bh4fl"); })();</script>

    <style>
        :root { --bg-color: #f0f2f5; --sidebar-color: #171a21; --primary-blue: #66c0f4; --text-main: #1b2838; --accent-orange: #f39c12; --discord-color: #7289da; }
        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Segoe UI', Arial, sans-serif; background: #000; overflow: hidden; }
        
        /* INTRO A VIDEO */
        #intro-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 99999; background: #000; display: flex; align-items: center; justify-content: center; transition: opacity 1s ease; }
        #intro-overlay video { width: 100%; height: 100%; object-fit: cover; }
        #start-btn { position: absolute; z-index: 100000; padding: 20px 40px; font-size: 24px; background: var(--primary-blue); border: none; cursor: pointer; border-radius: 10px; font-weight: bold; }
        .video-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }
        .video-bg video { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.3); }

        /* UI PRVKY */
        #login-screen, .app-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: flex; }
        .auth-card { background: rgba(23, 26, 33, 0.95); padding: 35px; border-radius: 15px; width: 400px; margin: auto; border: 1px solid var(--primary-blue); color: white; text-align: center; }
        .auth-input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 6px; border: 1px solid #2a475e; background: #1b2838; color: white; box-sizing: border-box; }
        .btn-steam { width: 100%; padding: 12px; background: var(--primary-blue); border: none; cursor: pointer; font-weight: bold; border-radius: 6px; text-transform: uppercase; margin-top: 10px; }
        .hidden { display: none !important; }
        .sidebar { width: 60px; background-color: var(--sidebar-color); color: white; transition: 0.3s; }
        .sidebar:hover { width: 260px; }
        .main-content { flex: 1; background: rgba(235, 240, 245, 0.85); overflow-y: auto; }
        .top-bar { background: #171a21; color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>

    <div id="intro-overlay">
        <button id="start-btn" onclick="startExperience()">VSTOUPIT DO WEBU</button>
        <video id="intro-video" playsinline>
            <source src="intro.mp4" type="video/mp4">
        </video>
    </div>

    <div class="video-bg">
        <video autoplay muted loop playsinline>
            <source src="https://rr4---sn-2gb7sn7r.googlevideo.com/videoplayback/..." type="video/mp4">
        </video>
    </div>

    <div id="login-screen">
        <div class="auth-card">
            <div id="step-rules">
                <h2>Pravidla</h2>
                <button class="btn-steam" onclick="acceptRules()">SOUHLASÍM</button>
            </div>
            <div id="step-form" class="hidden">
                <h1>SteamHub Login</h1>
                <input type="email" id="auth_email" class="auth-input" placeholder="E-mail">
                <input type="password" id="auth_pass" class="auth-input" placeholder="Heslo">
                <button class="btn-steam" onclick="handleLogin()">VSTOUPIT</button>
            </div>
        </div>
    </div>

    <div id="app" class="app-container hidden">
        <div class="sidebar">
            <div class="sidebar-header" style="padding:20px;">STEAMHUBCZ</div>
            <div class="nav-item" onclick="showPage('dashboard')">📊 Dashboard</div>
        </div>
        <div class="main-content">
            <div class="top-bar"><span>Vítejte v SteamHubu</span><span id="live-clock">00:00:00</span></div>
            <div class="content-area" id="page-dashboard">
                <div class="card"><h2>Dashboard</h2><p>Vítejte zpět!</p></div>
            </div>
        </div>
    </div>

    <script>
        const overlay = document.getElementById('intro-overlay');
        const video = document.getElementById('intro-video');

        function startExperience() {
            document.getElementById('start-btn').style.display = 'none';
            video.muted = false;
            video.play();
        }

        video.onended = function() {
            overlay.style.opacity = '0';
            setTimeout(() => overlay.style.display = 'none', 1000);
        };

        function acceptRules() {
            document.getElementById('step-rules').classList.add('hidden');
            document.getElementById('step-form').classList.remove('hidden');
        }

        function handleLogin() {
            const email = document.getElementById('auth_email').value;
            if(email) {
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('app').classList.remove('hidden');
            }
        }

        function showPage(id) { /* logika pro přepínání */ }
        setInterval(() => document.getElementById('live-clock').innerText = new Date().toLocaleTimeString(), 1000);
    </script>
</body>
</html>
