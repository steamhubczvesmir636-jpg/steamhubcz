<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SteamHubCZ | Vesmír636</title>
    
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script type="text/javascript">
        (function() { emailjs.init("yw3YNXC58nL3Bh4fl"); })();
    </script>

    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow-x: hidden; font-family: 'Segoe UI', Tahoma, sans-serif; color: #c7d5e0; background-color: #0b0e14; }
        .video-background { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; overflow: hidden; }
        .video-background iframe { width: 100vw; height: 56.25vw; min-height: 100vh; min-width: 177.77vh; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); border: none; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(5, 9, 15, 0.75); z-index: 0; }
        
        #global-alert { position: fixed; top: 0; left: 0; width: 100%; background: #e74c3c; color: white; padding: 10px; text-align: center; font-weight: bold; z-index: 1000; display: none; }

        .container { position: relative; z-index: 1; background: rgba(42, 71, 94, 0.85); padding: 2.5rem; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.7); max-width: 950px; width: 90%; text-align: center; backdrop-filter: blur(10px); margin: 50px auto; border: 1px solid rgba(102, 192, 244, 0.3); display: none; }
        .container.active { display: block; }
        
        h1 { color: #66c0f4; font-size: 3.5rem; margin-bottom: 0; text-transform: uppercase; letter-spacing: 2px; }
        .founder { color: #ffffff; font-weight: bold; font-size: 1.3rem; margin-top: 5px; margin-bottom: 30px; display: block; }
        
        .features { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-top: 20px; }
        .card { background: #171a21; padding: 25px; border-radius: 10px; border-bottom: 4px solid #66c0f4; transition: transform 0.3s; text-align: center; display: flex; flex-direction: column; justify-content: space-between; }
        
        .card-btn { background: #66c0f4; border: none; padding: 12px; border-radius: 5px; cursor: pointer; font-weight: bold; margin-top: 15px; color: #171a21; width: 100%; display: block; text-decoration: none; box-sizing: border-box; }
        .download-btn { background: #75b022; color: white; }

        .auth-card { background: #171a21; padding: 40px; border-radius: 15px; border: 1px solid #66c0f4; width: 350px; margin: 100px auto; text-align: center; position: relative; z-index: 10; }
        .auth-input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 5px; border: 1px solid #2a475e; background: #2a475e; color: white; box-sizing: border-box; }
        .auth-btn { width: 100%; padding: 12px; background: #66c0f4; border: none; color: #171a21; font-weight: bold; border-radius: 5px; cursor: pointer; margin-top: 10px; }

        #irl-clock { position: fixed; bottom: 20px; right: 20px; z-index: 100; background: rgba(0,0,0,0.8); color: #66c0f4; padding: 10px 20px; border-radius: 8px; font-weight: bold; border: 1px solid #66c0f4; }
        #mute-toggle { position: fixed; top: 20px; right: 20px; z-index: 100; background: rgba(0,0,0,0.6); color: white; border: 1px solid #66c0f4; width: 50px; height: 50px; border-radius: 50%; cursor: pointer; font-size: 1.2rem; }
        #settings-trigger { position: fixed; top: 20px; left: 20px; z-index: 100; background: rgba(0,0,0,0.6); color: white; border: 1px solid #f39c12; width: 50px; height: 50px; border-radius: 50%; cursor: pointer; display: none; align-items: center; justify-content: center; }

        #lock-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0b0e14; z-index: 2000; display: none; align-items: center; justify-content: center; flex-direction: column; text-align: center; }
        .lock-box { background: #171a21; padding: 40px; border-radius: 15px; border: 2px solid #e74c3c; max-width: 400px; }
    </style>
</head>
<body>

    <div id="global-alert"></div>
    
    <div id="lock-screen">
        <div class="lock-box">
            <h1 style="color:#e74c3c; font-size: 2rem;">⚠️ SERVER UZAMČEN</h1>
            <p id="lock-reason-text" style="font-size:1.2rem; color:white; margin: 20px 0;"></p>
            <hr style="border: 0.5px solid #2a475e; margin: 20px 0;">
            <p style="font-size: 0.9rem;">Správce může server odemknout zde:</p>
            <input type="password" id="unlock-pass" class="auth-input" placeholder="Zadej kód správce">
            <button class="auth-btn" onclick="requestUnlock()" style="background:#e74c3c; color:white;">ODEMKNOUT SERVER</button>
        </div>
    </div>

    <div class="video-background"><div id="player"></div></div>
    <div class="overlay"></div>
    <div id="irl-clock">00:00:00</div>

    <button id="mute-toggle" onclick="toggleMute()">🔇</button>
    <button id="settings-trigger" onclick="openSection('profile-content')">⚙️</button>

    <div id="auth-wrapper">
        <div id="login-box" class="auth-card">
            <h2 style="color:#66c0f4">SteamHub Login</h2>
            <input type="email" id="login_email" class="auth-input" placeholder="Tvůj e-mail">
            <button class="auth-btn" onclick="sendAuthCode('login')">ODESLAT KÓD</button>
            <p onclick="toggleAuth('reg')" style="cursor:pointer; text-decoration:underline; font-size:0.8rem; margin-top:10px;">Registrace</p>
        </div>
        <div id="reg-box" class="auth-card" style="display:none;">
            <h2 style="color:#66c0f4">Registrace</h2>
            <input type="text" id="reg_name" class="auth-input" placeholder="Přezdívka">
            <input type="email" id="reg_email" class="auth-input" placeholder="E-mail">
            <button class="auth-btn" onclick="sendAuthCode('reg')">REGISTROVAT</button>
        </div>
        <div id="verify-box" class="auth-card" style="display:none;">
            <input type="text" id="otp_code" class="auth-input" placeholder="Kód z e-mailu">
            <button class="auth-btn" onclick="verifyOTP()">VSTOUPIT</button>
        </div>
    </div>

    <div id="main-content" class="container">
        <h1>SteamHubCZ</h1>
        <span class="founder">Zakladatel: Vesmír636</span>
        <div class="features">
            <div class="card"><h3>🎮 Hry</h3><button class="card-btn" onclick="openSection('games-content')">VSTOUPIT</button></div>
            <div class="card"><h3>🕛 Eventy</h3><button class="card-btn" onclick="openSection('news-content')">VSTOUPIT</button></div>
            <div class="card"><h3>❓ FAQ</h3><button class="card-btn" onclick="openSection('faq-content')">VSTOUPIT</button></div>
        </div>
    </div>

    <div id="profile-content" class="container">
        <h1>Nastavení ⚙️</h1>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:20px; text-align:left;">
            <div class="card">
                <h3>👤 Profil</h3>
                <button class="auth-btn" onclick="logout()" style="background:#e74c3c; color:white;">ODHLÁSIT</button>
            </div>
            <div class="card" style="border-color:#f39c12;">
                <h3>🛡️ MOD PANEL</h3>
                <div id="mod-auth">
                    <input type="password" id="mod-pass" class="auth-input" placeholder="Heslo správce">
                    <button class="auth-btn" onclick="unlockMod()" style="background:#f39c12; color:white;">VSTOUPIT</button>
                </div>
                <div id="mod-tools" style="display:none;">
                    <label>Důvod uzamčení:</label>
                    <select id="lock-reason-select" class="auth-input">
                        <option value="Probíhá plánovaná údržba systému.">🔧 Údržba</option>
                        <option value="Web se aktualizuje o nové hry.">🆙 Aktualizace</option>
                        <option value="Server je dočasně přetížen.">⚠️ Přetížení</option>
                        <option value="Soukromý event pro moderátory.">🤫 Soukromý event</option>
                    </select>
                    <button class="auth-btn" onclick="adminToggleLock()" style="background:#e74c3c; color:white;">ZAMKNOUT WEB</button>
                    <hr style="border:0.5px solid #2a475e; margin:15px 0;">
                    <input type="text" id="ann-input" class="auth-input" placeholder="Zpráva pro všechny">
                    <button class="auth-btn" onclick="setAnn()" style="background:#e67e22; color:white;">ODESLAT OZNÁMENÍ</button>
                </div>
            </div>
        </div>
        <button onclick="closeSection('profile-content')" class="auth-btn" style="width:150px; margin-top:20px; background:#4e5d6a; color:white;">ZPĚT</button>
    </div>

    <script>
        const ADMIN_CODE = "4869";
        let otp = ""; let curMail = "";

        window.onload = function() {
            if(localStorage.getItem("sh_locked") === "true") {
                document.getElementById('lock-screen').style.display = 'flex';
                document.getElementById('lock-reason-text').innerText = "Důvod: " + (localStorage.getItem("sh_lock_msg") || "Údržba");
            }
            if(localStorage.getItem("sh_logged") === "true") showMain();
            setInterval(() => { document.getElementById('irl-clock').innerText = new Date().toLocaleTimeString('cs-CZ'); }, 1000);
        };

        // ZAMYKÁNÍ A ODEMYKÁNÍ
        function adminToggleLock() {
            const reason = document.getElementById('lock-reason-select').value;
            localStorage.setItem("sh_locked", "true");
            localStorage.setItem("sh_lock_msg", reason);
            location.reload();
        }

        function requestUnlock() {
            const input = document.getElementById('unlock-pass').value;
            if(input === ADMIN_CODE) {
                localStorage.setItem("sh_locked", "false");
                alert("Server byl úspěšně odemčen!");
                location.reload();
            } else {
                alert("Špatný kód správce!");
            }
        }

        function unlockMod() {
            if(document.getElementById('mod-pass').value === ADMIN_CODE) {
                document.getElementById('mod-auth').style.display = 'none';
                document.getElementById('mod-tools').style.display = 'block';
            } else { alert("Přístup zamítnut!"); }
        }

        // ZBYTEK FUNKCÍ (PŘIHLÁŠENÍ, ATD)
        function toggleAuth(m) { document.getElementById('login-box').style.display = m === 'login' ? 'block' : 'none'; document.getElementById('reg-box').style.display = m === 'reg' ? 'block' : 'none'; }
        function sendAuthCode(m) {
            const email = document.getElementById(m + '_email').value;
            if(!email.includes('@')) return alert("Chybný email!");
            otp = Math.floor(100000 + Math.random() * 900000).toString();
            emailjs.send("service_0jeaxzq", "template_6jc2oeh", { to_email: email, otp_code: otp }).then(() => {
                document.getElementById('login-box').style.display = 'none'; document.getElementById('reg-box').style.display = 'none';
                document.getElementById('verify-box').style.display = 'block';
            });
        }
        function verifyOTP() {
            if(document.getElementById('otp_code').value === otp) {
                localStorage.setItem("sh_logged", "true");
                showMain();
            } else alert("Chyba!");
        }
        function showMain() {
            document.getElementById('auth-wrapper').style.display = 'none';
            document.getElementById('main-content').classList.add('active');
            document.getElementById('settings-trigger').style.display = 'flex';
        }
        function logout() { localStorage.removeItem("sh_logged"); location.reload(); }
        function openSection(id) { document.querySelectorAll('.container').forEach(c => c.classList.remove('active')); document.getElementById(id).classList.add('active'); }
        function closeSection(id) { document.getElementById(id).classList.remove('active'); document.getElementById('main-content').classList.add('active'); }
        function setAnn() { localStorage.setItem("sh_ann", document.getElementById('ann-input').value); location.reload(); }

        var tag = document.createElement('script'); tag.src = "https://www.youtube.com/iframe_api";
        var firstScriptTag = document.getElementsByTagName('script')[0]; firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);
        var player;
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player', { videoId: '0BFw93N4ZJw', playerVars: { 'autoplay': 1, 'controls': 0, 'mute': 1, 'loop': 1, 'playlist': '0BFw93N4ZJw' } });
        }
        function toggleMute() {
            const btn = document.getElementById('mute-toggle');
            if(player.isMuted()) { player.unMute(); btn.innerText = '🔊'; } else { player.mute(); btn.innerText = '🔇'; }
        }
    </script>
</body>
</html>
