<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SteamHubCZ | Vesmír636</title>
    
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script type="text/javascript">
        (function() {
            emailjs.init("yw3YNXC58nL3Bh4fl"); 
        })();
    </script>

    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow-x: hidden; font-family: 'Segoe UI', Tahoma, sans-serif; color: #c7d5e0; background-color: #0b0e14; scroll-behavior: smooth; }
        .video-background { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; overflow: hidden; }
        .video-background iframe { width: 100vw; height: 56.25vw; min-height: 100vh; min-width: 177.77vh; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); border: none; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(5, 9, 15, 0.75); z-index: 0; }
        
        /* NAVIGAČNÍ MENU */
        nav { position: fixed; top: 0; left: 0; width: 100%; background: rgba(23, 26, 33, 0.95); padding: 10px 0; z-index: 500; border-bottom: 2px solid #66c0f4; display: none; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        .nav-container { max-width: 1100px; margin: 0 auto; display: flex; justify-content: space-between; align-items: center; padding: 0 20px; }
        .nav-logo { color: #66c0f4; font-weight: bold; font-size: 1.5rem; text-decoration: none; text-transform: uppercase; cursor: pointer; }
        .nav-links { display: flex; gap: 20px; align-items: center; }
        .nav-links a { color: white; text-decoration: none; font-weight: 500; transition: 0.3s; cursor: pointer; }
        .nav-links a:hover { color: #66c0f4; }
        
        .user-pill { background: rgba(102, 192, 244, 0.2); padding: 5px 15px; border-radius: 20px; border: 1px solid #66c0f4; display: flex; align-items: center; gap: 10px; cursor: pointer; }
        .user-pill img { width: 25px; height: 25px; border-radius: 50%; object-fit: cover; }

        /* AUTH OVERLAY */
        #auth-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0b0e14; z-index: 1000; display: flex; align-items: center; justify-content: center; }
        .auth-card { background: #171a21; padding: 40px; border-radius: 15px; border: 1px solid #66c0f4; width: 350px; text-align: center; }
        .auth-input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 5px; border: 1px solid #2a475e; background: #2a475e; color: white; box-sizing: border-box; outline: none; }
        .auth-btn { width: 100%; padding: 12px; background: #66c0f4; border: none; color: #171a21; font-weight: bold; border-radius: 5px; cursor: pointer; margin-top: 10px; }

        /* CONTAINER */
        .container { position: relative; z-index: 1; background: rgba(42, 71, 94, 0.85); padding: 2.5rem; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.7); max-width: 950px; width: 90%; text-align: center; backdrop-filter: blur(10px); margin: 100px auto 50px auto; border: 1px solid rgba(102, 192, 244, 0.3); }
        
        h1 { color: #66c0f4; font-size: 3rem; text-transform: uppercase; margin-bottom: 20px; }
        .features { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; }
        .card { background: #171a21; padding: 25px; border-radius: 10px; border-bottom: 4px solid #66c0f4; transition: 0.3s; }
        .card:hover { transform: translateY(-5px); }
        .card-btn { background: #66c0f4; border: none; padding: 12px; border-radius: 5px; cursor: pointer; font-weight: bold; margin-top: 15px; color: #171a21; width: 100%; text-decoration: none; display: block; }

        /* PROFIL STYLY */
        .avatar-selection { display: flex; justify-content: center; gap: 15px; margin: 20px 0; }
        .avatar-option { width: 60px; height: 60px; border-radius: 50%; cursor: pointer; border: 3px solid transparent; transition: 0.3s; }
        .avatar-option.active { border-color: #66c0f4; transform: scale(1.1); }
        
        #irl-clock { position: fixed; bottom: 20px; right: 20px; z-index: 100; background: rgba(0,0,0,0.8); color: #66c0f4; padding: 10px 20px; border-radius: 8px; font-weight: bold; border: 1px solid #66c0f4; }
        .timer-display { font-size: 1.1rem; color: #f39c12; font-weight: bold; }
    </style>
</head>
<body>

    <nav id="main-nav">
        <div class="nav-container">
            <a class="nav-logo" onclick="openSection('main-content')">SteamHubCZ</a>
            <div class="nav-links">
                <a onclick="openSection('games-content')">Hry</a>
                <a onclick="openSection('news-content')">Eventy</a>
                <div class="user-pill" onclick="openSection('profile-content')">
                    <img id="nav-avatar" src="https://cdn-icons-png.flaticon.com/512/149/149071.png">
                    <span id="nav-username">Uživatel</span>
                </div>
            </div>
        </div>
    </nav>

    <div id="auth-overlay">
        <div id="reg-box" class="auth-card">
            <h2 style="color:#66c0f4">SteamHub Login</h2>
            <input type="email" id="user_email" class="auth-input" placeholder="Zadej e-mail">
            <button id="send-btn" class="auth-btn" onclick="sendCode()">ODESLAT KÓD</button>
        </div>
        <div id="verify-box" class="auth-card" style="display: none;">
            <h2 style="color:#66c0f4">Ověření</h2>
            <input type="text" id="entered_code" class="auth-input" placeholder="Zadej kód">
            <button class="auth-btn" onclick="verifyCode()">VSTOUPIT</button>
        </div>
    </div>

    <div class="video-background"><div id="player"></div></div>
    <div class="overlay"></div>
    <div id="irl-clock">00:00:00</div>

    <div id="profile-content" class="container" style="display: none;">
        <h1>Nastavení Profilu</h1>
        <div class="card" style="max-width: 500px; margin: 0 auto; text-align: left;">
            <label>Tvoje Přezdívka:</label>
            <input type="text" id="profile-name-input" class="auth-input" placeholder="Napiš jméno...">
            
            <label style="display:block; margin-top:15px;">Vyber si Avatara:</label>
            <div class="avatar-selection">
                <img class="avatar-option" src="https://api.dicebear.com/7.x/pixel-art/svg?seed=Felix" onclick="selectAvatar(this.src)">
                <img class="avatar-option" src="https://api.dicebear.com/7.x/pixel-art/svg?seed=Aneka" onclick="selectAvatar(this.src)">
                <img class="avatar-option" src="https://api.dicebear.com/7.x/pixel-art/svg?seed=Buddy" onclick="selectAvatar(this.src)">
                <img class="avatar-option" src="https://api.dicebear.com/7.x/pixel-art/svg?seed=Max" onclick="selectAvatar(this.src)">
            </div>

            <button class="card-btn" onclick="saveProfile()" style="background:#75b022; color:white;">ULOŽIT NASTAVENÍ</button>
            <button class="card-btn" onclick="logout()" style="background:#e74c3c; color:white; margin-top:10px;">ODHLÁSIT SE</button>
        </div>
    </div>

    <div id="main-content" class="container" style="display: none;">
        <h1>Vítej, <span id="welcome-name">Uživateli</span>!</h1>
        <div class="features">
            <div class="card">
                <h3>🎮 Hry</h3>
                <button class="card-btn" onclick="openSection('games-content')">Vstoupit</button>
            </div>
            <div class="card">
                <h3>🕛 Eventy</h3>
                <button class="card-btn" onclick="openSection('news-content')">Zobrazit</button>
            </div>
        </div>
    </div>

    <div id="games-content" class="container" style="display: none;">
        <h1>Hry</h1>
        <div class="features">
            <div class="card"><h3>OMSI 2</h3><a href="#" class="card-btn">DOWNLOAD</a></div>
            <div class="card"><h3>DrainSim</h3><a href="#" class="card-btn">DOWNLOAD</a></div>
        </div>
        <button onclick="openSection('main-content')" class="card-btn" style="width:200px; margin: 30px auto;">Zpět</button>
    </div>

    <div id="news-content" class="container" style="display: none;">
        <h1>Eventy</h1>
        <div class="card"><h3>Středeční Pokec</h3><span id="wed-timer" class="timer-display">--</span></div>
        <button onclick="openSection('main-content')" class="card-btn" style="width:200px; margin: 30px auto;">Zpět</button>
    </div>

    <script>
        let correctCode = "";
        let currentAvatar = "https://cdn-icons-png.flaticon.com/512/149/149071.png";

        window.onload = function() {
            // Kontrola přihlášení
            if (localStorage.getItem("steamhub_auth") === "true") {
                loadProfile();
                showWebsite();
            }
        };

        // PROFILOVÉ FUNKCE
        function selectAvatar(src) {
            currentAvatar = src;
            document.querySelectorAll('.avatar-option').forEach(img => img.classList.remove('active'));
            event.target.classList.add('active');
        }

        function saveProfile() {
            const name = document.getElementById('profile-name-input').value || "Uživatel";
            localStorage.setItem("sh_username", name);
            localStorage.setItem("sh_avatar", currentAvatar);
            loadProfile();
            alert("Profil uložen!");
            openSection('main-content');
        }

        function loadProfile() {
            const name = localStorage.getItem("sh_username") || "Uživatel";
            const avatar = localStorage.getItem("sh_avatar") || "https://cdn-icons-png.flaticon.com/512/149/149071.png";
            
            document.getElementById('nav-username').innerText = name;
            document.getElementById('welcome-name').innerText = name;
            document.getElementById('nav-avatar').src = avatar;
            document.getElementById('profile-name-input').value = name;
        }

        function logout() {
            localStorage.clear();
            location.reload();
        }

        // LOGIN FUNKCE
        function sendCode() {
            const email = document.getElementById('user_email').value;
            if (!email.includes('@')) { alert("Zadej e-mail!"); return; }
            correctCode = Math.floor(100000 + Math.random() * 900000).toString();
            emailjs.send("service_0jeaxzq", "template_6jc2oeh", { to_email: email, otp_code: correctCode })
                .then(() => {
                    document.getElementById('reg-box').style.display = 'none';
                    document.getElementById('verify-box').style.display = 'block';
                });
        }

        function verifyCode() {
            if (document.getElementById('entered_code').value === correctCode) {
                localStorage.setItem("steamhub_auth", "true");
                showWebsite();
            } else { alert("Špatný kód!"); }
        }

        function showWebsite() {
            document.getElementById('auth-overlay').style.display = 'none';
            document.getElementById('main-content').style.display = 'block';
            document.getElementById('main-nav').style.display = 'block';
        }

        function openSection(id) {
            ['main-content', 'games-content', 'news-content', 'profile-content'].forEach(s => {
                document.getElementById(s).style.display = 'none';
            });
            document.getElementById(id).style.display = 'block';
        }

        // Hodiny
        setInterval(() => {
            document.getElementById('irl-clock').innerText = new Date().toLocaleTimeString('cs-CZ');
        }, 1000);

        // YouTube Pozadí
        var tag = document.createElement('script'); tag.src = "https://www.youtube.com/iframe_api";
        var firstScriptTag = document.getElementsByTagName('script')[0]; firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);
        var player;
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player', {
                videoId: '0BFw93N4ZJw',
                playerVars: { 'autoplay': 1, 'controls': 0, 'mute': 1, 'loop': 1, 'playlist': '0BFw93N4ZJw' }
            });
        }
    </script>
</body>
</html>
