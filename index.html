<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SteamHubCZ | Vesmír636</title>
    
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script type="text/javascript">
        (function() {
            emailjs.init("yw3YNXC58nL3Bh4fl"); 
        })();
    </script>

    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow: hidden; font-family: 'Segoe UI', sans-serif; color: #c7d5e0; background-color: #0b0e14; }
        .video-background { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; }
        .video-background iframe { width: 100vw; height: 56.25vw; min-height: 100vh; min-width: 177.77vh; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); border: none; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(5, 9, 15, 0.85); z-index: 0; }
        
        .main-wrapper { position: relative; z-index: 10; display: flex; align-items: center; justify-content: center; min-height: 100vh; width: 100%; }

        .container { background: rgba(23, 26, 33, 0.98); padding: 30px; border-radius: 15px; border: 1px solid #66c0f4; width: 90%; max-width: 600px; text-align: center; display: none; max-height: 90vh; overflow-y: auto; }
        .container.active { display: block; }

        .auth-input, select { width: 100%; padding: 12px; margin: 10px 0; border-radius: 5px; border: 1px solid #2a475e; background: #2a475e; color: white; box-sizing: border-box; }
        .auth-btn { width: 100%; padding: 12px; background: #66c0f4; border: none; color: #171a21; font-weight: bold; border-radius: 5px; cursor: pointer; margin-top: 10px; }
        .auth-btn:hover { background: #54a5d4; }

        /* Moderátorská sekce */
        .mod-box { background: rgba(243, 156, 18, 0.1); border: 1px solid #f39c12; border-radius: 8px; padding: 15px; margin-top: 20px; text-align: left; }
        .log-area { background: #000; color: #00ff00; padding: 10px; font-family: monospace; font-size: 0.8rem; height: 100px; overflow-y: auto; border-radius: 5px; margin: 10px 0; }

        /* Zámek obrazovka */
        #lock-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0b0e14; z-index: 9999; display: none; align-items: center; justify-content: center; text-align: center; flex-direction: column; }

        #settings-trigger { position: fixed; top: 20px; right: 20px; z-index: 100; background: rgba(0,0,0,0.6); color: white; border: 1px solid #66c0f4; width: 50px; height: 50px; border-radius: 50%; cursor: pointer; font-size: 1.5rem; display: none; align-items: center; justify-content: center; }
        #irl-clock { position: fixed; bottom: 20px; right: 20px; z-index: 100; background: rgba(0,0,0,0.8); color: #66c0f4; padding: 10px 20px; border-radius: 8px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="lock-screen">
        <h1 style="color: #e74c3c; font-size: 3rem;">⚠️ SERVER UZAMČEN</h1>
        <p id="lock-msg" style="font-size: 1.5rem; color: white;">Probíhá údržba systému...</p>
        <p style="color: #66c0f4;">Zkuste to prosím později.</p>
    </div>

    <div class="video-background"><div id="player"></div></div>
    <div class="overlay"></div>
    <div id="irl-clock">00:00:00</div>

    <button id="settings-trigger" onclick="showScreen('profile-content')">⚙️</button>

    <div class="main-wrapper">
        
        <div id="login-screen" class="container active">
            <h2 id="auth-title" style="color:#66c0f4">SteamHub Login</h2>
            <div id="auth-inputs">
                <input type="text" id="user_name" class="auth-input" placeholder="Tvoje jméno (jen u registrace)" style="display:none;">
                <input type="email" id="user_email" class="auth-input" placeholder="Tvůj e-mail">
                <button class="auth-btn" id="send-code-btn" onclick="sendAuthCode()">ODESLAT KÓD</button>
                <p id="auth-toggle" onclick="toggleAuthMode()" style="cursor:pointer; text-decoration:underline; font-size:0.9rem; margin-top:10px;">Nemám účet? Registrace</p>
            </div>
            <div id="verify-input" style="display:none;">
                <p>Kód byl odeslán!</p>
                <input type="text" id="otp_code" class="auth-input" placeholder="Zadej 6místný kód">
                <button class="auth-btn" onclick="verifyOTP()">VSTOUPIT</button>
            </div>
        </div>

        <div id="main-menu" class="container">
            <img id="main-avatar" src="" style="width: 70px; height: 70px; border-radius: 50%; border: 2px solid #66c0f4;">
            <h2 id="main-welcome">Vítej</h2>
            <h1 style="color:#66c0f4; margin-bottom:30px;">SteamHubCZ</h1>
            <div style="display:grid; gap:10px;">
                <button class="auth-btn" onclick="alert('Sekce Hry se připravuje')">🎮 HRY</button>
                <button class="auth-btn" onclick="alert('Sekce Eventy se připravuje')">🕛 EVENTY</button>
                <button class="auth-btn" onclick="window.open('https://discord.gg/DJJrpXkg8T')">💬 DISCORD</button>
            </div>
        </div>

        <div id="profile-content" class="container">
            <h2 style="color:#66c0f4">Nastavení ⚙️</h2>
            <div style="text-align:left;">
                <label>Jméno:</label><input type="text" id="set-name" class="auth-input">
                <label>Avatar URL:</label><input type="text" id="set-avatar" class="auth-input">
                <button class="auth-btn" onclick="saveProfile()" style="background:#75b022; color:white;">ULOŽIT PROFIL</button>
            </div>

            <div class="mod-box">
                <h3 style="color:#f39c12; margin-top:0;">🛡️ Moderátorská zóna</h3>
                <div id="mod-lock-ui">
                    <input type="password" id="mod-pass" class="auth-input" placeholder="Heslo moderátora">
                    <button class="auth-btn" onclick="unlockMod()" style="background:#f39c12; color:white;">PŘIHLÁSIT SE JAKO MOD</button>
                </div>
                <div id="mod-ui" style="display:none;">
                    <label>Zámek serveru:</label>
                    <select id="lock-reason">
                        <option value="Probíhá Update systému.">Update</option>
                        <option value="Server je v údržbě.">Údržba</option>
                        <option value="Právě probíhá soukromý Event.">Event</option>
                        <option value="Technické potíže - opravujeme.">Technické potíže</option>
                    </select>
                    <button class="auth-btn" id="lock-toggle-btn" onclick="toggleServerLock()" style="background:#e74c3c; color:white;">ZAMKNOUT WEB</button>
                    
                    <h4 style="margin-bottom:5px;">📜 Logy přihlášení:</h4>
                    <div class="log-area" id="log-list">Žádné logy...</div>
                    <button onclick="clearLogs()" style="font-size:0.7rem; background:none; border:none; color:#888; cursor:pointer;">Smazat logy</button>
                </div>
            </div>

            <button class="auth-btn" onclick="showScreen('main-menu')" style="background:#4e5d6a; color:white; margin-top:20px;">ZPĚT</button>
            <button class="auth-btn" onclick="logout()" style="background:#333; color:white; font-size:0.8rem;">Odhlásit se</button>
        </div>

    </div>

    <script>
        let isReg = false;
        let generatedOTP = "";
        let currentMail = "";

        window.onload = function() {
            checkLockStatus();
            if(localStorage.getItem("isLoggedIn") === "true") {
                loadMain();
            }
        };

        function checkLockStatus() {
            if(localStorage.getItem("webLocked") === "true") {
                document.getElementById('lock-screen').style.display = 'flex';
                document.getElementById('lock-msg').innerText = localStorage.getItem("lockReason") || "Údržba";
            }
        }

        function toggleAuthMode() {
            isReg = !isReg;
            document.getElementById('auth-title').innerText = isReg ? "SteamHub Registrace" : "SteamHub Login";
            document.getElementById('user_name').style.display = isReg ? "block" : "none";
            document.getElementById('auth-toggle').innerText = isReg ? "Už mám účet? Přihlášení" : "Nemám účet? Registrace";
        }

        function sendAuthCode() {
            const email = document.getElementById('user_email').value;
            if(!email.includes('@')) return alert("Neplatný e-mail!");
            
            if(isReg) localStorage.setItem("sh_name", document.getElementById('user_name').value || "Uživatel");
            
            currentMail = email;
            generatedOTP = Math.floor(100000 + Math.random() * 900000).toString();
            
            emailjs.send("service_0jeaxzq", "template_6jc2oeh", { to_email: email, otp_code: generatedOTP })
            .then(() => {
                document.getElementById('auth-inputs').style.display = 'none';
                document.getElementById('verify-input').style.display = 'block';
            });
        }

        function verifyOTP() {
            if(document.getElementById('otp_code').value === generatedOTP) {
                localStorage.setItem("isLoggedIn", "true");
                addLog(currentMail);
                location.reload();
            } else { alert("Špatný kód!"); }
        }

        function addLog(mail) {
            let logs = JSON.parse(localStorage.getItem("sh_logs") || "[]");
            logs.push(`${new Date().toLocaleTimeString()}: ${mail}`);
            localStorage.setItem("sh_logs", JSON.stringify(logs));
        }

        function loadMain() {
            const name = localStorage.getItem("sh_name") || "Uživatel";
            const img = localStorage.getItem("sh_img") || "https://cdn-icons-png.flaticon.com/512/149/149071.png";
            
            document.getElementById('main-welcome').innerText = "Vítej, " + name + "!";
            document.getElementById('main-avatar').src = img;
            document.getElementById('set-name').value = name;
            document.getElementById('set-avatar').value = img;
            
            document.getElementById('settings-trigger').style.display = 'flex';
            showScreen('main-menu');
        }

        function showScreen(id) {
            document.querySelectorAll('.container').forEach(c => c.classList.remove('active'));
            document.getElementById(id).classList.add('active');
        }

        function saveProfile() {
            localStorage.setItem("sh_name", document.getElementById('set-name').value);
            localStorage.setItem("sh_img", document.getElementById('set-avatar').value);
            alert("Uloženo!");
            loadMain();
        }

        // MODERÁTORSKÉ FUNKCE
        function unlockMod() {
            if(document.getElementById('mod-pass').value === "4869") {
                document.getElementById('mod-lock-ui').style.display = 'none';
                document.getElementById('mod-ui').style.display = 'block';
                refreshLogs();
                updateModBtn();
            } else { alert("Chyba!"); }
        }

        function toggleServerLock() {
            const currentState = localStorage.getItem("webLocked") === "true";
            if(currentState) {
                localStorage.setItem("webLocked", "false");
            } else {
                localStorage.setItem("webLocked", "true");
                localStorage.setItem("lockReason", document.getElementById('lock-reason').value);
            }
            updateModBtn();
            alert("Stav zámku změněn!");
        }

        function updateModBtn() {
            const isLocked = localStorage.getItem("webLocked") === "true";
            const btn = document.getElementById('lock-toggle-btn');
            btn.innerText = isLocked ? "ODEMKNOUT WEB" : "ZAMKNOUT WEB";
            btn.style.background = isLocked ? "#75b022" : "#e74c3c";
        }

        function refreshLogs() {
            const logs = JSON.parse(localStorage.getItem("sh_logs") || "[]");
            document.getElementById('log-list').innerHTML = logs.reverse().join("<br>") || "Žádné logy.";
        }

        function clearLogs() { localStorage.setItem("sh_logs", "[]"); refreshLogs(); }

        function logout() { localStorage.removeItem("isLoggedIn"); location.reload(); }
        
        setInterval(() => { document.getElementById('irl-clock').innerText = new Date().toLocaleTimeString('cs-CZ'); }, 1000);

        var tag = document.createElement('script'); tag.src = "https://www.youtube.com/iframe_api";
        var firstScriptTag = document.getElementsByTagName('script')[0]; firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);
        var player;
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player', {
                videoId: '0BFw93N4ZJw',
                playerVars: { 'autoplay': 1, 'controls': 0, 'mute': 1, 'loop': 1, 'playlist': '0BFw93N4ZJw' }
            });
        }
    </script>
</body>
</html>
