<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SteamHubCZ | Vesmír636</title>
    
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <script type="text/javascript">
        (function() { emailjs.init("yw3YNXC58nL3Bh4fl"); })();
    </script>

    <style>
        :root {
            --steam-blue: #66c0f4;
            --steam-dark: #171a21;
            --steam-bg: #0b0e14;
            --accent-orange: #f39c12;
            --glass: rgba(23, 26, 33, 0.85);
        }

        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow-x: hidden; font-family: 'Segoe UI', sans-serif; color: #c7d5e0; background-color: var(--steam-bg); }
        
        .video-background { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; overflow: hidden; }
        .video-background iframe { width: 100vw; height: 56.25vw; min-height: 100vh; min-width: 177.77vh; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); border: none; filter: brightness(0.4); }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, rgba(5, 9, 15, 0.5) 0%, rgba(5, 9, 15, 0.9) 100%); z-index: 0; }
        
        #settings-trigger { position: fixed; top: 25px; left: 25px; z-index: 100; background: rgba(0,0,0,0.7); color: white; border: 1px solid var(--accent-orange); width: 60px; height: 60px; border-radius: 50%; cursor: pointer; display: none; align-items: center; justify-content: center; font-size: 1.8rem; transition: 0.3s; box-shadow: 0 0 15px rgba(243, 156, 18, 0.2); }
        #settings-trigger:hover { transform: rotate(90deg); background: var(--accent-orange); }

        .container { position: relative; z-index: 1; background: var(--glass); padding: 3rem; border-radius: 20px; box-shadow: 0 15px 50px rgba(0,0,0,0.8); max-width: 950px; width: 90%; text-align: center; backdrop-filter: blur(15px); margin: 80px auto; border: 1px solid rgba(102, 192, 244, 0.2); display: none; }
        .container.active { display: block; animation: fadeIn 0.5s ease; }
        
        h1 { color: var(--steam-blue); font-size: 4.5rem; margin-bottom: 0; text-transform: uppercase; letter-spacing: 6px; font-weight: 900; text-shadow: 0 0 20px rgba(102, 192, 244, 0.4); }
        .developer { color: #ffffff; font-weight: bold; font-size: 1.1rem; margin-bottom: 40px; display: block; opacity: 0.8; letter-spacing: 2px; }
        
        .auth-card { background: var(--steam-dark); padding: 40px; border-radius: 20px; border: 1px solid rgba(102, 192, 244, 0.3); width: 380px; margin: 100px auto; text-align: center; position: relative; z-index: 10; box-shadow: 0 20px 60px rgba(0,0,0,0.9); }
        .auth-input { width: 100%; padding: 14px; margin: 10px 0; border-radius: 8px; border: 1px solid #2a475e; background: #1b2838; color: white; box-sizing: border-box; font-size: 1rem; }
        .auth-btn { width: 100%; padding: 14px; background: var(--steam-blue); border: none; color: var(--steam-dark); font-weight: 800; border-radius: 8px; cursor: pointer; text-transform: uppercase; transition: 0.3s; }
        .auth-btn:hover { background: white; transform: scale(1.02); }

        /* Upravená mřížka s mezerami */
        .main-nav-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 30px; margin-top: 20px; }

        .event-list { display: flex; flex-direction: column; gap: 15px; margin-top: 20px; text-align: left; }
        .event-card { background: rgba(0,0,0,0.4); padding: 20px; border-radius: 12px; border: 1px solid rgba(102, 192, 244, 0.2); display: flex; justify-content: space-between; align-items: center; }
        .timer-highlight { background: #0a0f16; border: 1px solid var(--steam-blue); color: var(--steam-blue); padding: 8px 15px; border-radius: 8px; font-weight: bold; font-family: monospace; font-size: 1.1rem; }

        #irl-clock { position: fixed; bottom: 25px; right: 25px; z-index: 100; background: rgba(0,0,0,0.85); color: var(--steam-blue); padding: 12px 25px; border-radius: 12px; font-weight: 900; border: 1px solid var(--steam-blue); font-size: 1.5rem; }
        #discord-fixed { position: fixed; bottom: 25px; right: 210px; z-index: 100; background: #5865F2; color: white; padding: 12px 25px; border-radius: 12px; font-weight: bold; text-decoration: none; border: 1px solid rgba(255,255,255,0.2); display: none; }

        .settings-group { margin-bottom: 25px; padding-bottom: 15px; border-bottom: 1px solid rgba(255,255,255,0.1); }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <div class="video-background"><div id="player"></div></div>
    <div class="overlay"></div>
    <div id="irl-clock">00:00:00</div>
    <a href="https://discord.gg/ps4TDE6nr" target="_blank" id="discord-fixed">DISCORD 💬</a>
    
    <button id="settings-trigger" onclick="openSection('profile-content')">⚙️</button>

    <div id="auth-wrapper">
        <div id="login-box" class="auth-card">
            <h2 style="color:var(--steam-blue)">PŘIHLÁŠENÍ</h2>
            <div id="step-1">
                <input type="email" id="auth_email" class="auth-input" placeholder="E-mail">
                <input type="password" id="auth_pass" class="auth-input" placeholder="Heslo">
                <button class="auth-btn" id="send-btn" onclick="sendAuthCode()" style="margin-top: 15px;">ODESLAT KÓD</button>
            </div>
            <div id="step-2" style="display:none; margin-top: 20px; border-top: 1px solid #2a475e; padding-top: 20px;">
                <p style="color:var(--accent-orange)">Zadejte kód z e-mailu:</p>
                <input type="text" id="otp_input" class="auth-input" placeholder="000000" maxlength="6" style="text-align:center; letter-spacing:5px;">
                <button class="auth-btn" style="background: #2ecc71; color: white; margin-top: 15px;" onclick="verifyOTP()">VSTOUPIT</button>
            </div>
        </div>
    </div>

    <div id="main-content" class="container">
        <div style="display:flex; align-items:center; justify-content:center; gap:20px; margin-bottom:15px;">
            <img id="main-avatar" src="" style="width:65px; height:65px; border-radius:50%; border:3px solid var(--steam-blue); object-fit: cover;">
            <h2 id="welcome-text">Vítej!</h2>
        </div>
        <h1>STEAMHUBCZ</h1>
        <span class="developer">DEVELOPER: VESMÍR636</span>
        
        <div class="main-nav-grid">
            <button class="auth-btn" style="background: #54a5d4; color: white;" onclick="openSection('faq-content')">❓ FAQ</button>
            <a href="https://store.steampowered.com" target="_blank" class="auth-btn" style="text-decoration:none; display:flex; align-items:center; justify-content:center; background: #54a5d4; color: white;">🎮 STEAM</a>
            <button class="auth-btn" style="background: var(--accent-orange); color: white;" onclick="openSection('news-content')">📅 AKCE</button>
        </div>
        
        <button class="auth-btn" onclick="logout()" style="width:150px; background:none; border:1px solid #e74c3c; color:#e74c3c; margin-top:60px;">ODHLÁSIT SE</button>
    </div>

    <!-- NASTAVENÍ (S HUDBOU) -->
    <div id="profile-content" class="container">
        <h1>NASTAVENÍ ⚙️</h1>
        <div style="text-align: left; max-width: 500px; margin: 0 auto;">
            
            <div class="settings-group">
                <h3 style="color: var(--steam-blue); margin-top: 0;">HUDBA V POZADÍ</h3>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 15px;">
                    <button class="auth-btn" onclick="muteMusic()" style="background: #e74c3c; color: white;">VYPNOUT ZVUK</button>
                    <button class="auth-btn" onclick="unmuteMusic()" style="background: #2ecc71; color: white;">ZAPNOUT ZVUK</button>
                </div>
            </div>

            <div class="settings-group">
                <h3 style="color: var(--steam-blue);">PROFIL</h3>
                <label>Přezdívka:</label>
                <input type="text" id="edit-name" class="auth-input">
                <label style="margin-top: 10px; display: block;">Avatar URL:</label>
                <input type="text" id="edit-avatar" class="auth-input">
                <button class="auth-btn" onclick="saveProfile()" style="background:#75b022; color:white; margin-top: 15px;">ULOŽIT PROFIL</button>
            </div>

        </div>
        <button onclick="closeSection('profile-content')" class="auth-btn" style="width:150px; margin-top:20px; background:#2a475e; color:white;">ZAVŘÍT</button>
    </div>

    <div id="news-content" class="container">
        <h1>PLÁNOVANÉ AKCE</h1>
        <div class="event-list">
            <div class="event-card">
                <div><b style="color:var(--accent-orange)">STŘEDEČNÍ POKEC</b><br>16:00 - 18:00</div>
                <div id="wed-timer" class="timer-highlight">00:00:00</div>
            </div>
            <div class="event-card">
                <div><b style="color:var(--accent-orange)">NÁBOR MODERÁTORŮ</b><br>Čtvrtek v 16:00</div>
                <div id="thu-timer" class="timer-highlight">00:00:00</div>
            </div>
        </div>
        <button onclick="closeSection('news-content')" class="auth-btn" style="width:150px; margin-top:30px; background:#2a475e; color:white;">ZPĚT</button>
    </div>

    <div id="faq-content" class="container">
        <h1>FAQ</h1>
        <p>Sekce se připravuje...</p>
        <button onclick="closeSection('faq-content')" class="auth-btn" style="width:150px; margin-top:20px; background:#2a475e; color:white;">ZPĚT</button>
    </div>

    <script>
        const firebaseConfig = { databaseURL: "https://steamhubcz-default-rtdb.europe-west1.firebasedatabase.app/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let generatedOTP = null;
        var player;

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player', { 
                videoId: '0BFw93N4ZJw', 
                playerVars: { 'autoplay': 1, 'controls': 0, 'mute': 1, 'loop': 1, 'playlist': '0BFw93N4ZJw' },
                events: { 'onReady': onPlayerReady }
            });
        }

        function onPlayerReady(event) { event.target.playVideo(); }
        function muteMusic() { if(player) player.mute(); }
        function unmuteMusic() { if(player) player.unMute(); }

        window.onload = function() {
            if(localStorage.getItem("sh_logged") === "true") { showMain(); loadProfile(); }
            setInterval(() => { document.getElementById('irl-clock').innerText = new Date().toLocaleTimeString('cs-CZ'); }, 1000);
            setInterval(updateEventTimers, 1000);
        };

        function sendAuthCode() {
            const email = document.getElementById('auth_email').value;
            if(!email.includes('@')) { alert("Zadej email!"); return; }
            generatedOTP = Math.floor(100000 + Math.random() * 900000).toString();
            document.getElementById('send-btn').innerText = "ODESÍLÁM...";
            emailjs.send("service_0jeaxzq", "template_6jc2oeh", { to_email: email, otp_code: generatedOTP }).then(() => {
                document.getElementById('step-1').style.display = 'none';
                document.getElementById('step-2').style.display = 'block';
            });
        }

        function verifyOTP() {
            if(document.getElementById('otp_input').value === generatedOTP) {
                localStorage.setItem("sh_logged", "true");
                showMain(); loadProfile();
            } else alert("Špatný kód!");
        }

        function showMain() {
            document.getElementById('auth-wrapper').style.display = 'none';
            document.getElementById('main-content').classList.add('active');
            document.getElementById('settings-trigger').style.display = 'flex';
            document.getElementById('discord-fixed').style.display = 'block';
        }

        function logout() { localStorage.clear(); location.reload(); }
        function openSection(id) { document.querySelectorAll('.container').forEach(c => c.classList.remove('active')); document.getElementById(id).classList.add('active'); }
        function closeSection(id) { document.getElementById(id).classList.remove('active'); document.getElementById('main-content').classList.add('active'); }

        function loadProfile() {
            const name = localStorage.getItem("sh_name") || "Uživatel";
            const img = localStorage.getItem("sh_img") || "https://cdn-icons-png.flaticon.com/512/149/149071.png";
            document.getElementById('welcome-text').innerText = "Vítej zpět, " + name;
            document.getElementById('main-avatar').src = img;
            document.getElementById('edit-name').value = name;
            document.getElementById('edit-avatar').value = img;
        }

        function saveProfile() {
            localStorage.setItem("sh_name", document.getElementById('edit-name').value);
            localStorage.setItem("sh_img", document.getElementById('edit-avatar').value);
            loadProfile(); alert("Uloženo!");
        }

        function updateEventTimers() {
            const now = new Date();
            const calculate = (targetDay, hour, min, timerId) => {
                let target = new Date();
                target.setDate(now.getDate() + (targetDay + 7 - now.getDay()) % 7);
                target.setHours(hour, min, 0, 0);
                if (now > target) target.setDate(target.getDate() + 7);
                const diff = target - now;
                const h = Math.floor(diff / 3600000), m = Math.floor((diff % 3600000) / 60000), s = Math.floor((diff % 60000) / 1000);
                document.getElementById(timerId).innerText = `${h.toString().padStart(2,'0')}:${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
            };
            calculate(3, 16, 0, 'wed-timer');
            calculate(4, 16, 0, 'thu-timer');
        }
    </script>
    <script src="https://www.youtube.com/iframe_api"></script>
</body>
</html>
