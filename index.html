<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SteamHubCZ | Dashboard</title>
    
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script src="https://www.youtube.com/iframe_api"></script>
    <script>(function() { emailjs.init("yw3YNXC58nL3Bh4fl"); })();</script>

    <style>
        :root {
            --bg-color: #0f172a;
            --sidebar-color: rgba(15, 23, 42, 0.95);
            --primary-blue: #38bdf8;
            --text-main: #f1f5f9;
            --accent-orange: #f59e0b;
            --card-bg: rgba(30, 41, 59, 0.7);
        }

        body, html { margin: 0; padding: 0; height: 100%; font-family: 'Segoe UI', Arial, sans-serif; background-color: var(--bg-color); color: var(--text-main); overflow-x: hidden; }
        
        /* Video pozadí */
        .video-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background: #000; }
        .video-bg iframe { width: 100vw; height: 56.25vw; min-height: 100vh; min-width: 177.77vh; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); filter: brightness(0.2) saturate(0.5); pointer-events: none; }

        /* UI Komponenty */
        .hidden { display: none !important; }
        .card { background: var(--card-bg); backdrop-filter: blur(10px); border: 1px solid rgba(255,255,255,0.1); padding: 25px; border-radius: 16px; margin-bottom: 25px; }

        /* Sidebar - vysouvací */
        .sidebar { position: fixed; left: -280px; top: 0; height: 100vh; width: 260px; background: var(--sidebar-color); backdrop-filter: blur(20px); border-right: 1px solid rgba(255,255,255,0.1); transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1); z-index: 1000; display: flex; flex-direction: column; }
        .sidebar.open { left: 0; box-shadow: 10px 0 30px rgba(0,0,0,0.5); }
        .sidebar-header { padding: 40px 20px 20px; font-size: 1.5rem; font-weight: 800; color: var(--primary-blue); text-align: center; }
        .nav-item { padding: 15px 25px; cursor: pointer; transition: 0.3s; color: #94a3b8; display: flex; align-items: center; gap: 12px; }
        .nav-item:hover, .nav-item.active { background: rgba(56, 189, 248, 0.1); color: white; border-left: 4px solid var(--primary-blue); }

        .menu-trigger { position: fixed; top: 20px; left: 20px; z-index: 1001; cursor: pointer; font-size: 24px; color: white; background: rgba(255,255,255,0.1); padding: 10px 15px; border-radius: 12px; backdrop-filter: blur(10px); transition: 0.3s; }
        .menu-trigger:hover { background: var(--primary-blue); transform: scale(1.05); }

        /* Auth Screen */
        #login-screen { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; z-index: 2000; background: rgba(0,0,0,0.7); backdrop-filter: blur(5px); }
        .auth-card { background: rgba(15, 23, 42, 0.95); padding: 40px; border-radius: 20px; width: 100%; max-width: 500px; max-height: 90vh; overflow-y: auto; border: 1px solid var(--primary-blue); backdrop-filter: blur(20px); }
        .auth-input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1); background: rgba(0,0,0,0.3); color: white; box-sizing: border-box; }
        .btn-steam { width: 100%; padding: 12px; background: var(--primary-blue); color: #171a21; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; text-transform: uppercase; margin-top: 10px; }
        
        .rules-container { text-align: left; background: rgba(0,0,0,0.2); padding: 15px; border-radius: 8px; font-size: 0.9rem; }
        .tab-btn { background: none; border: none; color: #888; font-size: 1.1rem; padding: 10px 20px; cursor: pointer; }
        .tab-btn.active { color: var(--primary-blue); border-bottom: 2px solid var(--primary-blue); }
        
        .main-content { padding: 80px 40px; transition: 0.4s; }
    </style>
</head>
<body>

    <div class="video-bg"><div id="player"></div></div>

    <div class="sidebar" id="sidebar" onmouseleave="toggleSidebar(false)">
        <div class="sidebar-header">STEAMHUBCZ</div>
        <div class="nav-item active" onclick="showPage('dashboard')">📊 Dashboard</div>
        <div class="nav-item" onclick="showPage('faq')">❓ FAQ</div>
        <div class="nav-item" onclick="showPage('events')">📅 Eventy</div>
        <div class="nav-item" onclick="showPage('settings')">⚙️ Nastavení</div>
    </div>
    <div class="menu-trigger" onmouseenter="toggleSidebar(true)">☰</div>

    <div id="login-screen">
        <div class="auth-card">
            <div id="step-rules">
                <div class="rules-container">
                    <h3>Pravidla serveru (Zkráceno)</h3>
                    <p>1. Buďte slušní. 2. Žádný spam. 3. Legální obsah. 4. Poslouchejte adminy.</p>
                </div>
                <button class="btn-steam" onclick="acceptRules()">SOUHLASÍM</button>
            </div>
            
            <div id="step-form" class="hidden">
                <div id="auth-tabs-nav">
                    <button id="tab-login" class="tab-btn active" onclick="switchAuthTab('login')">Přihlášení</button>
                    <button id="tab-register" class="tab-btn" onclick="switchAuthTab('register')">Registrace</button>
                </div>
                <div id="auth-login-fields">
                    <input type="email" id="auth_email" class="auth-input" placeholder="E-mail">
                    <input type="password" id="auth_pass" class="auth-input" placeholder="Heslo">
                    <button class="btn-steam" onclick="handleLogin()">Vstoupit</button>
                </div>
                <div id="auth-register-fields" class="hidden">
                    <input type="text" id="reg_name" class="auth-input" placeholder="Uživatelské jméno">
                    <input type="email" id="reg_email" class="auth-input" placeholder="E-mail">
                    <input type="password" id="reg_pass" class="auth-input" placeholder="Heslo">
                    <button class="btn-steam" onclick="handleRegister()">Registrovat</button>
                </div>
            </div>
        </div>
    </div>

    <div id="app" class="main-content hidden">
        <div id="page-dashboard" class="page"><div class="card"><h1>Dashboard</h1><p>Vítejte!</p></div></div>
        <div id="page-faq" class="page hidden"><div class="card"><h1>FAQ</h1></div></div>
        <div id="page-events" class="page hidden"><div class="card"><h1>Eventy</h1></div></div>
        <div id="page-settings" class="page hidden"><div class="card"><h1>Nastavení</h1><button onclick="logout()" class="btn-steam">Odhlásit</button></div></div>
    </div>

    <script>
        // Init
        const firebaseConfig = { databaseURL: "https://steamhubcz-default-rtdb.europe-west1.firebasedatabase.app/" };
        firebase.initializeApp(firebaseConfig);
        
        function onYouTubeIframeAPIReady() {
            new YT.Player('player', {
                videoId: 'ATo6V6Xm_eY', 
                playerVars: { 'autoplay': 1, 'controls': 0, 'mute': 1, 'loop': 1, 'playlist': 'ATo6V6Xm_eY' }
            });
        }

        // Sidebar
        function toggleSidebar(open) { document.getElementById('sidebar').classList.toggle('open', open); }

        // Auth Logika
        function acceptRules() { document.getElementById('step-rules').classList.add('hidden'); document.getElementById('step-form').classList.remove('hidden'); }
        
        function switchAuthTab(type) {
            document.getElementById('auth-login-fields').classList.toggle('hidden', type !== 'login');
            document.getElementById('auth-register-fields').classList.toggle('hidden', type !== 'register');
            document.getElementById('tab-login').classList.toggle('active', type === 'login');
            document.getElementById('tab-register').classList.toggle('active', type === 'register');
        }

        function handleLogin() {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('app').classList.remove('hidden');
        }

        function handleRegister() { alert("Registrace proběhla!"); }

        function showPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.add('hidden'));
            document.getElementById('page-' + pageId).classList.remove('hidden');
            document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
            event.currentTarget.classList.add('active');
            toggleSidebar(false);
        }

        function logout() { location.reload(); }
    </script>
</body>
</html>
