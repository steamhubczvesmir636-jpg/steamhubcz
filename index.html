<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SteamHubCZ | Vesmír636</title>
    
    <!-- Externí knihovny -->
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>

    <!-- Inicializace EmailJS s tvým Public Key -->
    <script type="text/javascript">
        (function() { emailjs.init("yw3YNXC58nL3Bh4fl"); })();
    </script>

    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow-x: hidden; font-family: 'Segoe UI', Tahoma, sans-serif; color: #c7d5e0; background-color: #0b0e14; }
        .video-background { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; overflow: hidden; }
        .video-background iframe { width: 100vw; height: 56.25vw; min-height: 100vh; min-width: 177.77vh; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); border: none; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(5, 9, 15, 0.8); z-index: 0; }
        
        #global-alert { position: fixed; top: 0; left: 0; width: 100%; background: #e67e22; color: white; padding: 15px; text-align: center; font-weight: bold; z-index: 1001; display: none; }
        .container { position: relative; z-index: 1; background: rgba(42, 71, 94, 0.85); padding: 2.5rem; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.7); max-width: 950px; width: 90%; text-align: center; backdrop-filter: blur(10px); margin: 80px auto; border: 1px solid rgba(102, 192, 244, 0.3); display: none; }
        .container.active { display: block; animation: fadeIn 0.4s ease; }
        
        h1 { color: #66c0f4; font-size: 4.5rem; margin-bottom: 0; text-transform: uppercase; letter-spacing: 4px; font-weight: 800; }
        .founder { color: #ffffff; font-weight: bold; font-size: 1.2rem; margin-bottom: 30px; display: block; opacity: 0.8; }
        
        .button-grid { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 15px; margin-top: 20px; }
        .card-btn { background: #66c0f4; border: none; padding: 15px; border-radius: 8px; cursor: pointer; font-weight: bold; color: #171a21; font-size: 1.1rem; transition: 0.3s; text-decoration: none; display: flex; align-items: center; justify-content: center; gap: 8px; }
        .card-btn:hover { background: white; transform: translateY(-2px); }
        
        .auth-card { background: #171a21; padding: 40px; border-radius: 15px; border: 1px solid #66c0f4; width: 350px; margin: 100px auto; text-align: center; position: relative; z-index: 10; }
        .auth-input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 5px; border: 1px solid #2a475e; background: #2a475e; color: white; box-sizing: border-box; }
        .auth-btn { width: 100%; padding: 12px; background: #66c0f4; border: none; color: #171a21; font-weight: bold; border-radius: 5px; cursor: pointer; margin-top: 10px; }

        #irl-clock { position: fixed; bottom: 20px; right: 20px; z-index: 100; background: rgba(0,0,0,0.8); color: #66c0f4; padding: 10px 20px; border-radius: 8px; font-weight: bold; border: 1px solid #66c0f4; font-size: 1.5rem; }
        #settings-trigger { position: fixed; top: 20px; left: 20px; z-index: 100; background: rgba(0,0,0,0.6); color: white; border: 1px solid #f39c12; width: 55px; height: 55px; border-radius: 50%; cursor: pointer; display: none; align-items: center; justify-content: center; font-size: 1.5rem; }

        #lock-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #05070a; z-index: 9999; display: none; align-items: center; justify-content: center; flex-direction: column; text-align: center; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body oncontextmenu="return false;">

    <div id="global-alert"></div>

    <!-- LOCK SCREEN (Má absolutní prioritu při zamčení) -->
    <div id="lock-screen">
        <h1 style="color:#ff4d4d">SERVER UZAMČEN</h1>
        <p id="lock-reason-text" style="font-size: 2rem; color: #c7d5e0; margin-top: -20px;"></p>
        <button id="admin-unlock-btn" onclick="requestUnlock()" class="auth-btn" style="background:#ff4d4d; color:white; width: 220px; display:none;">ADMIN ODEMKNUTÍ</button>
    </div>

    <!-- Video pozadí a Overlay -->
    <div class="video-background"><div id="player"></div></div>
    <div class="overlay"></div>
    <div id="irl-clock">00:00:00</div>
    
    <!-- Tlačítko pro nastavení (ozubené kolečko) -->
    <button id="settings-trigger" onclick="openSection('profile-content')">⚙️</button>

    <!-- SEKCE: AUTENTIZACE -->
    <div id="auth-wrapper">
        <div id="login-box" class="auth-card">
            <h2 style="color:#66c0f4">SteamHub Login</h2>
            <input type="email" id="login_email" class="auth-input" placeholder="Tvůj e-mail">
            <button class="auth-btn" onclick="sendAuthCode('login')">ODESLAT KÓD</button>
            <p onclick="toggleAuth('reg')" style="cursor:pointer; text-decoration:underline; font-size:0.8rem; margin-top:15px; opacity: 0.7;">Nemáš účet? Registrace</p>
        </div>
        <div id="reg-box" class="auth-card" style="display:none;">
            <h2 style="color:#66c0f4">Registrace</h2>
            <input type="text" id="reg_name" class="auth-input" placeholder="Přezdívka">
            <input type="email" id="reg_email" class="auth-input" placeholder="E-mail">
            <button class="auth-btn" onclick="sendAuthCode('reg')">REGISTROVAT</button>
        </div>
        <div id="verify-box" class="auth-card" style="display:none;">
            <p>Kód byl odeslán na e-mail.</p>
            <input type="text" id="otp_code" class="auth-input" placeholder="000000">
            <button class="auth-btn" onclick="verifyOTP()">VSTOUPIT</button>
        </div>
    </div>

    <!-- SEKCE: HLAVNÍ MENU -->
    <div id="main-content" class="container">
        <div style="display:flex; align-items:center; justify-content:center; gap:15px; margin-bottom:10px;">
            <img id="main-avatar" src="" style="width:55px; height:55px; border-radius:50%; border:2px solid #66c0f4; object-fit: cover;">
            <h2 id="welcome-text" style="font-size: 1.3rem; margin:0;">Vítej!</h2>
        </div>
        <h1>STEAMHUBCZ</h1>
        <span class="founder">Zakladatel: Vesmír636</span>
        <div class="button-grid">
            <button class="card-btn" style="background: white;" onclick="openSection('faq-content')">❓ FAQ</button>
            <a href="https://store.steampowered.com" target="_blank" class="card-btn">🎮 HRY</a>
            <button class="card-btn" style="background:#f39c12; color:white;" onclick="openSection('news-content')">📅 EVENTY</button>
        </div>
        <button class="card-btn" onclick="logout()" style="background:#e74c3c; color:white; width: 180px; margin: 30px auto 0;">ODHLÁSIT SE</button>
    </div>

    <!-- SEKCE: FAQ -->
    <div id="faq-content" class="container">
        <h1>ČASTÉ DOTAZY</h1>
        <div id="faq-list">
            <p style="opacity:0.5;">Sekce FAQ je momentálně prázdná.</p>
        </div>
        <button onclick="closeSection('faq-content')" class="auth-btn" style="width:150px; margin-top:20px; background:#4e5d6a; color:white;">ZPĚT</button>
    </div>

    <!-- SEKCE: NASTAVENÍ A MODERÁTORSKÝ PANEL -->
    <div id="profile-content" class="container">
        <h1>NASTAVENÍ <span id="mod-title"></span> ⚙️</h1>
        <div style="display:grid; grid-template-columns: 1fr 1fr; gap:20px; text-align:left;">
            <div class="event-card" style="background:rgba(0,0,0,0.2); padding:15px; border-radius:10px;">
                <h3>👤 Tvůj Profil</h3>
                <input type="text" id="edit-name" class="auth-input" placeholder="Jméno">
                <input type="text" id="edit-avatar" class="auth-input" placeholder="URL obrázku">
                <button class="auth-btn" onclick="saveProfile()" style="background:#75b022; color:white;">ULOŽIT</button>
            </div>
            
            <div id="admin-panel-card" class="event-card" style="border: 1px solid #f39c12; background:rgba(0,0,0,0.2); padding:15px; border-radius:10px; display:none;">
                <h3>🛡️ MODERÁTORSKÝ PANEL</h3>
                <p>Oznámení:</p>
                <input type="text" id="ann-input" class="auth-input" placeholder="Text zprávy...">
                <button class="auth-btn" onclick="setAnn()" style="background:#e67e22; color:white;">POSLAT</button>
                <button class="auth-btn" onclick="deleteAnn()" style="background:#c0392b; color:white;">SMAZAT</button>
                <hr style="margin:15px 0; border:0; border-top:1px solid #444;">
                <p>Zámek webu:</p>
                <select id="lock-reason-select" class="auth-input">
                    <option value="Údržba systému">Údržba</option>
                    <option value="Soukromá akce">Soukromá akce</option>
                </select>
                <button class="auth-btn" onclick="adminToggleLock()" style="background:#e74c3c; color:white;">ZAMKNOUT WEB</button>
            </div>
        </div>
        <button onclick="closeSection('profile-content')" class="auth-btn" style="width:150px; margin-top:20px; background:#4e5d6a; color:white;">ZAVŘÍT</button>
    </div>

    <!-- LOGIKA JAVASCRIPT -->
    <script>
        const firebaseConfig = { databaseURL: "https://steamhubcz-default-rtdb.europe-west1.firebasedatabase.app/" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        
        // OWNER ÚČET
        const adminEmail = "stepanmoravec27@gmail.com";

        window.onload = function() {
            // Kontrola zámku serveru
            db.ref('siteSettings/lock').on('value', snapshot => {
                const status = snapshot.val();
                const lockScreen = document.getElementById('lock-screen');
                const mainContent = document.getElementById('main-content');
                const authWrapper = document.getElementById('auth-wrapper');

                if (status && status.isLocked) {
                    lockScreen.style.display = 'flex';
                    document.getElementById('lock-reason-text').innerText = status.reason;
                    mainContent.style.display = 'none';
                    authWrapper.style.display = 'none';
                    document.getElementById('settings-trigger').style.display = 'none';
                    if(localStorage.getItem("sh_user_email") === adminEmail) {
                        document.getElementById('admin-unlock-btn').style.display = 'block';
                    }
                } else {
                    lockScreen.style.display = 'none';
                    if(localStorage.getItem("sh_logged") === "true") { showMain(); }
                    else { authWrapper.style.display = 'block'; }
                }
            });

            // Kontrola oznámení (Global Alert)
            db.ref('siteSettings/announcement').on('value', snapshot => {
                const ann = snapshot.val();
                const alertBox = document.getElementById('global-alert');
                if(ann && ann.trim() !== "") { alertBox.innerText = ann; alertBox.style.display = 'block'; }
                else alertBox.style.display = 'none';
            });

            if(localStorage.getItem("sh_logged") === "true") { loadProfile(); }
            setInterval(() => { document.getElementById('irl-clock').innerText = new Date().toLocaleTimeString('cs-CZ'); }, 1000);
        };

        // ADMIN FUNKCE
        function setAnn() { db.ref('siteSettings/announcement').set(document.getElementById('ann-input').value); }
        function deleteAnn() { db.ref('siteSettings/announcement').set(""); }
        function adminToggleLock() { db.ref('siteSettings/lock').set({ isLocked: true, reason: document.getElementById('lock-reason-select').value }); }
        function requestUnlock() { db.ref('siteSettings/lock').set({ isLocked: false, reason: "" }); }

        // EMAIL SYSTÉM (EmailJS)
        let generatedOTP = "";
        let pendingEmail = "";

        function sendAuthCode(type) {
            pendingEmail = type === 'login' ? document.getElementById('login_email').value : document.getElementById('reg_email').value;
            if(!pendingEmail) return alert("Zadej e-mail!");
            generatedOTP = Math.floor(100000 + Math.random() * 900000).toString();
            
            // TVÉ SERVICE ID: service_0jeaxzq
            emailjs.send("service_0jeaxzq", "template_otp", {
                to_email: pendingEmail,
                otp_code: generatedOTP
            }).then(() => {
                alert("Kód odeslán!");
                document.getElementById('login-box').style.display = 'none';
                document.getElementById('reg-box').style.display = 'none';
                document.getElementById('verify-box').style.display = 'block';
            }).catch(err => alert("Chyba: " + (err.text || "Zkontroluj Service ID")));
        }

        function verifyOTP() {
            if(document.getElementById('otp_code').value === generatedOTP) {
                localStorage.setItem("sh_user_email", pendingEmail);
                localStorage.setItem("sh_logged", "true");
                showMain();
                loadProfile();
            } else alert("Špatný kód!");
        }

        // NAVIGACE
        function showMain() {
            document.getElementById('auth-wrapper').style.display = 'none';
            document.getElementById('main-content').classList.add('active');
            document.getElementById('settings-trigger').style.display = 'flex';

            const userEmail = localStorage.getItem("sh_user_email");
            if (userEmail === adminEmail) {
                document.getElementById('admin-panel-card').style.display = 'block';
                document.getElementById('mod-title').innerText = "& MOD PANEL";
            }
        }

        function loadProfile() {
            const name = localStorage.getItem("sh_name") || "Uživatel", img = localStorage.getItem("sh_img") || "https://cdn-icons-png.flaticon.com/512/149/149071.png";
            document.getElementById('welcome-text').innerText = "Vítej, " + name;
            document.getElementById('main-avatar').src = img;
            document.getElementById('edit-name').value = name;
            document.getElementById('edit-avatar').value = img;
        }

        function saveProfile() {
            localStorage.setItem("sh_name", document.getElementById('edit-name').value);
            localStorage.setItem("sh_img", document.getElementById('edit-avatar').value);
            loadProfile(); alert("Profil uložen!");
        }

        function logout() { localStorage.clear(); location.reload(); }
        function openSection(id) { document.querySelectorAll('.container').forEach(c => c.classList.remove('active')); document.getElementById(id).classList.add('active'); }
        function closeSection(id) { document.getElementById(id).classList.remove('active'); document.getElementById('main-content').classList.add('active'); }
        function toggleAuth(m) { document.getElementById('login-box').style.display = m === 'login' ? 'block' : 'none'; document.getElementById('reg-box').style.display = m === 'reg' ? 'block' : 'none'; }
    </script>

    <!-- YouTube API pro video/audio na pozadí -->
    <script src="https://www.youtube.com/iframe_api"></script>
    <script>
        var player;
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player', { videoId: '0BFw93N4ZJw', playerVars: { 'autoplay': 1, 'controls': 0, 'mute': 1, 'loop': 1, 'playlist': '0BFw93N4ZJw' } });
        }
    </script>
</body>
</html>
