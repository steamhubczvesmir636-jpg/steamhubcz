<!DOCTYPE html>
<html lang="cs">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SteamHubCZ | Verifikace</title>
    
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@3/dist/email.min.js"></script>
    <script type="text/javascript">
        (function() {
            // Tvůj Public Key
            emailjs.init("yw3YNXC58nL3Bh4fl");
        })();
    </script>

    <style>
        body, html { margin: 0; padding: 0; width: 100%; height: 100%; overflow-x: hidden; font-family: 'Segoe UI', sans-serif; color: #c7d5e0; background-color: #0b0e14; }
        .video-background { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; pointer-events: none; overflow: hidden; }
        .video-background iframe { width: 100vw; height: 56.25vw; min-height: 100vh; min-width: 177.77vh; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); border: none; }
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(5, 9, 15, 0.85); z-index: 0; }
        
        /* AUTH OVERLAY */
        #auth-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0b0e14; z-index: 1000; display: flex; align-items: center; justify-content: center; }
        .auth-card { background: #171a21; padding: 40px; border-radius: 15px; border: 1px solid #66c0f4; width: 350px; text-align: center; box-shadow: 0 0 20px rgba(102, 192, 244, 0.2); }
        .auth-card h2 { color: #66c0f4; margin-top: 0; }
        .auth-input { width: 100%; padding: 12px; margin: 10px 0; border-radius: 5px; border: 1px solid #2a475e; background: #2a475e; color: white; box-sizing: border-box; outline: none; }
        .auth-btn { width: 100%; padding: 12px; background: #66c0f4; border: none; color: #171a21; font-weight: bold; border-radius: 5px; cursor: pointer; margin-top: 10px; transition: 0.3s; }
        .auth-btn:hover { background: #54a5d4; transform: scale(1.02); }
        .auth-btn:disabled { background: #4e5d6a; cursor: not-allowed; }
        .switch-auth { font-size: 0.9rem; color: #888; margin-top: 15px; cursor: pointer; display: block; }

        /* MAIN CONTENT */
        .container { position: relative; z-index: 1; background: rgba(42, 71, 94, 0.85); padding: 2.5rem; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.7); max-width: 950px; width: 90%; text-align: center; backdrop-filter: blur(10px); margin: 50px auto; border: 1px solid rgba(102, 192, 244, 0.3); }
        h1 { color: #66c0f4; font-size: 3.5rem; margin-bottom: 0; text-transform: uppercase; letter-spacing: 2px; }
        .features { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 20px; margin-top: 20px; }
        .card { background: #171a21; padding: 25px; border-radius: 10px; border-bottom: 4px solid #66c0f4; }
        .card-btn { background: #66c0f4; border: none; padding: 12px; border-radius: 5px; cursor: pointer; font-weight: bold; margin-top: 15px; color: #171a21; text-decoration: none; display: block; }
        #irl-clock { position: fixed; bottom: 20px; right: 20px; z-index: 100; background: rgba(0,0,0,0.8); color: #66c0f4; padding: 10px 20px; border-radius: 8px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="auth-overlay">
        <div id="reg-box" class="auth-card">
            <h2>SteamHub Vstup</h2>
            <p style="font-size: 0.85rem; color: #888;">Zadej svůj e-mail pro zaslání kódu.</p>
            <input type="email" id="user_email" class="auth-input" placeholder="Tvoje e-mailová adresa">
            <button id="send-btn" class="auth-btn" onclick="sendVerificationCode()">ODESLAT KÓD</button>
        </div>

        <div id="verify-box" class="auth-card" style="display: none;">
            <h2>Ověření kódu</h2>
            <p id="info-text" style="font-size: 0.85rem; color: #888;">Kód byl odeslán. Zkontroluj si schránku.</p>
            <input type="text" id="entered_code" class="auth-input" placeholder="Zadej 6místný kód">
            <button class="auth-btn" onclick="checkCode()">VSTOUPIT DO MENU</button>
        </div>
    </div>

    <div class="video-background"><div id="player"></div></div>
    <div class="overlay"></div>
    <div id="irl-clock">00:00:00</div>

    <div id="main-content" class="container" style="display: none;">
        <h1>SteamHubCZ</h1>
        <p>Vítej v komunitě!</p>
        <div class="features">
            <div class="card">
                <h3>🎮 Hry</h3>
                <button class="card-btn" onclick="alert('Sekce her je připravena!')">Zobrazit hry</button>
            </div>
            <div class="card">
                <h3>🕛 Eventy</h3>
                <button class="card-btn" onclick="alert('Plán eventů se načítá...')">Plán akcí</button>
            </div>
        </div>
    </div>

    <script>
        let generatedCode = "";

        function sendVerificationCode() {
            const email = document.getElementById('user_email').value;
            const btn = document.getElementById('send-btn');

            if (!email.includes('@')) {
                alert("Zadej prosím platný e-mail!");
                return;
            }

            // Vygenerování náhodného 6místného kódu
            generatedCode = Math.floor(100000 + Math.random() * 900000).toString();
            
            btn.disabled = true;
            btn.innerText = "Odesílám...";

            // EmailJS odeslání
            const templateParams = {
                to_email: email,
                otp_code: generatedCode // Musí se shodovat s názvem v šabloně EmailJS
            };

            emailjs.send("service_0jeaxzq", "template_6jc2oeh", templateParams)
                .then(function() {
                    document.getElementById('reg-box').style.display = 'none';
                    document.getElementById('verify-box').style.display = 'block';
                }, function(error) {
                    alert("Chyba při odesílání: " + JSON.stringify(error));
                    btn.disabled = false;
                    btn.innerText = "ODESLAT KÓD";
                });
        }

        function checkCode() {
            const userCode = document.getElementById('entered_code').value;
            if (userCode === generatedCode) {
                document.getElementById('auth-overlay').style.display = 'none';
                document.getElementById('main-content').style.display = 'block';
            } else {
                alert("Špatný kód! Zkus to znovu.");
            }
        }

        // Hodiny
        function updateClock() { document.getElementById('irl-clock').innerText = new Date().toLocaleTimeString('cs-CZ'); }
        setInterval(updateClock, 1000); updateClock();

        // YouTube API
        var tag = document.createElement('script'); tag.src = "https://www.youtube.com/iframe_api";
        var firstScriptTag = document.getElementsByTagName('script')[0]; firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);
        var player;
        function onYouTubeIframeAPIReady() {
            player = new YT.Player('player', {
                videoId: '0BFw93N4ZJw',
                playerVars: { 'autoplay': 1, 'controls': 0, 'rel': 0, 'mute': 1, 'loop': 1, 'playlist': '0BFw93N4ZJw' }
            });
        }
    </script>
</body>
</html>
